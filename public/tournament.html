<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tournaments - SportIQ</title>
    <link rel="stylesheet" href="css/global.css" />
  </head>
  <body>
    <noscript>
      <meta http-equiv="refresh" content="0;url=find-tournament.html" />
      <p>Redirecting to Find Tournaments…</p>
    </noscript>

    <script type="module">
      import { requireLogin } from "./js/core/auth.js";
      import { getCurrentUser } from "./js/modules/users.js";

      requireLogin();
      const user = getCurrentUser();
      if (!user || user.role !== "Player") {
        window.location.href = "dashboard.html";
      } else {
        // Go directly to the new Find UI
        window.location.replace("find-tournament.html");
      }
    </script>
  </body>
</html>
