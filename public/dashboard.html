<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportIQ - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Cinzel:wght@700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue-950: #020B18;
    --blue-900: #061527;
    --blue-800: #0A2040;
    --blue-700: #0D3060;
    --blue-600: #1146A0;
    --blue-500: #1A5FD4;
    --blue-400: #3B82F6;
    --blue-300: #6EA8FE;
    --blue-200: #A8CCFF;
    --white-pure:  #FFFFFF;
    --white-warm:  #F8FAFF;
    --white-ghost: #A8BBDA;
    --accent-sky:  #38BDF8;
    --accent-cyan: #06B6D4;
  }

  html, body {
    min-height: 100vh;
    font-family: 'Rajdhani', sans-serif;
    background: var(--blue-950);
    color: var(--white-pure);
    overflow-x: hidden;
    padding-bottom: 80px;
  }

  /* ── BG ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(26,95,212,0.20) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.10) 0%, transparent 50%),
      radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.55) 100%),
      linear-gradient(135deg, var(--blue-950) 0%, var(--blue-900) 50%, var(--blue-950) 100%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── PARTICLES ── */
  .particles { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
  .p { position:absolute; border-radius:50%; animation:floatUp linear infinite; opacity:0; }
  @keyframes floatUp {
    0%   { transform:translateY(100vh) scale(0); opacity:0; }
    10%  { opacity:0.6; }
    90%  { opacity:0.3; }
    100% { transform:translateY(-10vh) scale(1.2); opacity:0; }
  }

  /* ── TOP NAV ── */
  .topnav {
    position: sticky; top:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px;
    background:rgba(2,11,24,0.88);
    backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(59,130,246,0.12);
    animation: fadeDown 0.6s ease both;
  }
  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-20px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .brand { display:flex; align-items:center; gap:10px; }
  .logo-ring {
    width:36px; height:36px;
    border:2px solid var(--blue-400); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 12px rgba(59,130,246,0.4);
    animation: ringPulse 3s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%,100% { box-shadow:0 0 10px rgba(59,130,246,0.3); }
    50%      { box-shadow:0 0 24px rgba(59,130,246,0.7); }
  }
  .logo-ring svg { width:18px; height:18px; fill:var(--blue-400); }
  .brand-name {
    font-family:'Cinzel',serif; font-size:1.1rem;
    letter-spacing:.2em; color:#fff; font-weight:700;
  }
  .brand-name span { color:var(--blue-400); }
  .topnav-right { display:flex; align-items:center; gap:14px; }

  .notif-btn {
    position:relative; background:none; border:none; cursor:pointer;
    color:rgba(255,255,255,0.6); transition:color .3s;
    display:flex; align-items:center; justify-content:center;
    width:38px; height:38px; border-radius:50%;
    border:1px solid rgba(59,130,246,0.15);
    background: rgba(59,130,246,0.07);
    transition: all .3s;
  }
  .notif-btn:hover { color:var(--blue-400); background:rgba(59,130,246,0.14); border-color:var(--blue-400); }
  .notif-btn svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; }
  .notif-dot {
    position:absolute; top:1px; right:1px;
    width:8px; height:8px; background:#ef4444; border-radius:50%;
    border:1.5px solid var(--blue-950);
  }
  .avatar {
    width:36px; height:36px; border-radius:50%;
    border:2px solid var(--blue-400);
    background: linear-gradient(135deg, var(--blue-500), var(--blue-800));
    display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-size:1rem; color:#fff; font-weight:700;
    cursor:pointer;
    box-shadow:0 0 10px rgba(59,130,246,0.3);
    transition: transform .2s, box-shadow .3s;
  }
  .avatar:hover { transform: scale(1.12); box-shadow: 0 0 22px rgba(59,130,246,0.7); }

  /* ── MAIN ── */
  .main {
    position:relative; z-index:1;
    padding:20px 16px;
    max-width:900px; margin:0 auto;
  }

  /* ── WELCOME STRIP ── */
  .welcome-strip {
    background: linear-gradient(135deg, rgba(26,95,212,0.15), rgba(59,130,246,0.05));
    border:1px solid rgba(59,130,246,0.20);
    border-radius:16px; padding:16px 20px;
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:20px;
    animation: fadeUp 0.6s ease 0.2s both;
    position:relative; overflow:hidden;
  }
  .welcome-strip::before {
    content:''; position:absolute;
    top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg, var(--blue-500), var(--accent-sky));
  }
  .welcome-strip h2 {
    font-family:'Oswald',sans-serif; font-size:1.3rem;
    color:#fff; letter-spacing:.08em;
  }
  .welcome-strip h2 span { color:var(--blue-400); }
  .welcome-strip p {
    font-size:.82rem; color:rgba(255,255,255,0.45);
    letter-spacing:.06em; margin-top:2px;
  }
  .impact-badge { text-align:center; }
  .impact-badge .score {
    font-family:'Oswald',sans-serif; font-size:2rem;
    color:var(--blue-300); font-weight:700;
    text-shadow:0 0 20px rgba(59,130,246,0.6); line-height:1;
  }
  .impact-badge .label {
    font-size:.7rem; color:rgba(255,255,255,0.4);
    letter-spacing:.15em; text-transform:uppercase;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── SECTION TITLE ── */
  .sec-title {
    font-family:'Oswald',sans-serif; font-size:1rem;
    letter-spacing:.18em; text-transform:uppercase;
    color:var(--blue-300); margin-bottom:12px;
    display:flex; align-items:center; gap:8px;
  }
  .sec-title::after {
    content:''; flex:1; height:1px;
    background:linear-gradient(90deg, rgba(59,130,246,0.3), transparent);
  }

  /* ── CARD BASE ── */
  .card {
    background:rgba(6,21,39,0.75);
    border:1px solid rgba(59,130,246,0.18);
    border-radius:16px;
    backdrop-filter:blur(20px);
    padding:20px;
    margin-bottom:18px;
    animation: fadeUp 0.6s ease both;
    position:relative;
  }
  .card::before {
    content:''; position:absolute;
    top:10px; left:10px;
    width:24px; height:24px;
    border-top:1.5px solid rgba(59,130,246,0.4);
    border-left:1.5px solid rgba(59,130,246,0.4);
    border-radius:4px 0 0 0;
  }
  .card::after {
    content:''; position:absolute;
    bottom:10px; right:10px;
    width:24px; height:24px;
    border-bottom:1.5px solid rgba(59,130,246,0.4);
    border-right:1.5px solid rgba(59,130,246,0.4);
    border-radius:0 0 4px 0;
  }

  /* ── ASSESSMENT CARD ── */
  .assess-inner { display:flex; align-items:center; gap:16px; }
  .assess-icon {
    width:48px; height:48px; flex-shrink:0;
    border:1.5px solid var(--blue-400); border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    background:rgba(59,130,246,0.06);
  }
  .assess-icon svg { width:24px; height:24px; stroke:var(--blue-400); fill:none; stroke-width:2; }
  .assess-info h3 {
    font-family:'Oswald',sans-serif; font-size:1.1rem;
    color:#fff; letter-spacing:.06em; margin-bottom:4px;
  }
  .assess-info p { font-size:.82rem; color:rgba(255,255,255,0.4); letter-spacing:.04em; }
  .assess-btns { display:flex; gap:10px; margin-top:16px; }
  .btn-start {
    padding:12px 28px;
    background:linear-gradient(135deg,var(--blue-500),var(--blue-600));
    border:none; border-radius:10px; cursor:pointer;
    font-family:'Rajdhani',sans-serif;
    font-size:.95rem; font-weight:700;
    letter-spacing:.16em; color:#fff; text-transform:uppercase;
    box-shadow:0 0 16px rgba(26,95,212,0.4);
    transition:transform .2s, box-shadow .3s;
  }
  .btn-start:hover { transform:translateY(-2px); box-shadow:0 0 28px rgba(59,130,246,0.6); }
  .btn-myassess {
    padding:12px 22px;
    background:rgba(59,130,246,0.08);
    border:1px solid rgba(59,130,246,0.22);
    border-radius:10px; cursor:pointer;
    font-family:'Rajdhani',sans-serif;
    font-size:.95rem; font-weight:700;
    letter-spacing:.1em; color:var(--white-ghost);
    transition:background .3s, border-color .3s, color .2s, transform .2s;
  }
  .btn-myassess:hover { background:rgba(59,130,246,0.15); border-color:var(--blue-400); color:#fff; transform:translateY(-1px); }

  /* ── BOTTOM NAV ── */
  .bottomnav {
    position:fixed; bottom:0; left:0; right:0; z-index:100;
    background:rgba(2,11,24,0.92);
    backdrop-filter:blur(20px);
    border-top:1px solid rgba(59,130,246,0.12);
    display:flex; align-items:center;
    padding:8px 0 10px;
  }
  a.nav-item, a.nav-item:visited { color:rgba(255,255,255,0.35); text-decoration:none; }
  .nav-item {
    flex:1; display:flex; flex-direction:column;
    align-items:center; gap:4px; cursor:pointer;
    padding:4px 0;
    color:rgba(255,255,255,0.35);
    transition:color .3s;
    border:none; background:none;
    font-family:'Rajdhani',sans-serif;
  }
  .nav-item svg { width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.8; }
  .nav-item span { font-size:.7rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
  .nav-item.active { color:var(--blue-400); }
  .nav-item.active svg { filter:drop-shadow(0 0 6px rgba(59,130,246,0.6)); }
  .nav-item:hover { color:var(--blue-400); }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--blue-700); border:1px solid var(--blue-400);
    border-radius:10px; padding:10px 24px;
    font-family:'Rajdhani',sans-serif; font-size:.95rem; font-weight:700;
    color:#fff; letter-spacing:.1em;
    opacity:0; transition:all .4s ease; z-index:200;
    backdrop-filter:blur(10px); white-space:nowrap;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── PROFILE DRAWER ── */
  .drawer-backdrop {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: all; }

  .profile-drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(400px, 92vw); z-index: 201;
    background: rgba(4,14,30,0.98);
    border-left: 1px solid rgba(59,130,246,0.22);
    box-shadow: -8px 0 40px rgba(0,0,0,0.7), -2px 0 0 rgba(59,130,246,0.08);
    transform: translateX(100%);
    transition: transform 0.38s cubic-bezier(.22,1,.36,1);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .profile-drawer.open { transform: translateX(0); }

  .drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(59,130,246,0.12); flex-shrink: 0;
  }
  .drawer-title {
    font-family: 'Oswald', sans-serif;
    font-size: 1.1rem; letter-spacing: .16em;
    color: #fff; display: flex; align-items: center; gap: 8px;
  }
  .drawer-close {
    background: rgba(59,130,246,0.07); border: 1px solid rgba(59,130,246,0.15);
    border-radius: 50%; cursor: pointer; width:32px; height:32px;
    display: flex; align-items:center; justify-content:center;
    color: rgba(255,255,255,0.4); transition: all .3s;
  }
  .drawer-close:hover { color: #ef4444; background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.3); }
  .drawer-close svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2.5; }

  .drawer-profile-top {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 20px 14px; flex-shrink: 0;
  }
  .drawer-avatar {
    width: 56px; height: 56px; border-radius: 50%;
    border: 2px solid var(--blue-400);
    background: linear-gradient(135deg, var(--blue-500), var(--blue-800));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Oswald', sans-serif; font-size: 1.5rem;
    color: #fff; font-weight: 700; flex-shrink: 0;
    box-shadow: 0 0 18px rgba(59,130,246,0.3);
  }
  .drawer-name {
    font-family: 'Oswald', sans-serif; font-size: 1.2rem;
    color: #fff; letter-spacing: .08em;
  }
  .drawer-role {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(26,95,212,0.12); border: 1px solid rgba(59,130,246,0.28);
    border-radius: 20px; padding: 3px 10px;
    font-size: .73rem; font-weight: 700; letter-spacing: .1em;
    color: var(--blue-400); text-transform: uppercase; margin-top: 5px;
  }
  .drawer-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.2), transparent);
    margin: 0 20px; flex-shrink: 0;
  }
  .drawer-scroll {
    flex: 1; overflow-y: auto; padding: 18px 20px 20px;
    scrollbar-width: thin; scrollbar-color: rgba(59,130,246,0.2) transparent;
  }

  /* profile grid */
  .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  @media(max-width:400px) { .profile-grid { grid-template-columns: 1fr; } }

  .pfield { display: flex; flex-direction: column; gap: 4px; }
  .pfield label {
    font-size: .72rem; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--blue-300);
    opacity: .7;
  }
  .pfield .val {
    font-size: .93rem; font-weight: 600; color: rgba(255,255,255,0.85);
    padding: 8px 10px;
    background: rgba(59,130,246,0.04);
    border: 1px solid rgba(59,130,246,0.10);
    border-radius: 8px; min-height: 36px;
  }
  .pfield input, .pfield select {
    font-size: .93rem; font-weight: 600; color: #fff;
    padding: 8px 10px;
    background: rgba(59,130,246,0.08);
    border: 1px solid var(--blue-400); border-radius: 8px;
    outline: none; font-family: 'Rajdhani', sans-serif;
    width: 100%; display: none;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.08);
    transition: border-color .3s, box-shadow .3s;
  }
  .pfield input:focus { border-color:var(--accent-sky); box-shadow:0 0 0 3px rgba(56,189,248,0.12); }
  .pfield input::placeholder { color: rgba(255,255,255,0.28); }
  .pfield select option { background: var(--blue-950); color: #fff; }

  .profile-actions { display: flex; gap: 10px; margin-top: 4px; }
  .btn-edit {
    flex: 1; padding: 11px;
    background: rgba(59,130,246,0.08); border: 1px solid var(--blue-400);
    border-radius: 10px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: .93rem; font-weight: 700; letter-spacing: .12em;
    color: var(--blue-400); text-transform: uppercase;
    transition: background .3s, transform .2s;
  }
  .btn-edit:hover { background: rgba(59,130,246,0.15); transform: translateY(-1px); }
  .btn-save {
    flex: 1; padding: 11px;
    background: linear-gradient(135deg, var(--blue-500), var(--blue-600));
    border: none; border-radius: 10px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: .93rem; font-weight: 700; letter-spacing: .12em;
    color: #fff; text-transform: uppercase;
    box-shadow: 0 0 16px rgba(26,95,212,0.4);
    transition: transform .2s, box-shadow .3s; display: none;
  }
  .btn-save:hover { transform: translateY(-1px); box-shadow: 0 0 26px rgba(59,130,246,0.6); }
  .btn-cancel {
    padding: 11px 16px;
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: .93rem; font-weight: 700;
    color: #ef4444; text-transform: uppercase;
    transition: background .3s; display: none;
  }
  .btn-cancel:hover { background: rgba(239,68,68,0.18); }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<!-- ── TOP NAV ── -->
<nav class="topnav">
  <div class="brand">
    <div class="logo-ring">
      <svg viewBox="0 0 24 24"><path d="M12 2L3 7l9 5 9-5-9-5zM3 17l9 5 9-5M3 12l9 5 9-5"/></svg>
    </div>
    <span class="brand-name">Sport<span>IQ</span></span>
  </div>
  <div class="topnav-right">
    <button class="notif-btn" onclick="window.location='notifications.html'" aria-label="Notifications">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span class="notif-dot"></span>
    </button>
    <div class="avatar" id="avatarInitial" onclick="openProfile()">P</div>
  </div>
</nav>

<!-- ── MAIN ── -->
<main id="dashboardContent" class="dashboard-content pb-24">
    <!-- Role-specific dashboard will be injected here by dashboards.js -->
</main>

<!-- ── PROFILE DRAWER ── -->
<div class="drawer-backdrop" id="drawerBackdrop" onclick="closeProfile()"></div>
<div class="profile-drawer" id="profileDrawer">

  <div class="drawer-header">
    <div class="drawer-title"><span>👤</span> Profile Summary</div>
    <button class="drawer-close" onclick="closeProfile()">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div class="drawer-profile-top">
    <div class="drawer-avatar" id="drawerAvatar">P</div>
    <div>
      <div class="drawer-name" id="drawerName">Player Name</div>
      <div class="drawer-role">🏏 Player</div>
    </div>
  </div>

  <div class="drawer-divider"></div>

  <div class="drawer-scroll">
    <div class="profile-grid">
      <div class="pfield">
        <label>Username</label>
        <div class="val" id="v-username">—</div>
        <input type="text" id="i-username" placeholder="Enter username">
      </div>
      <div class="pfield">
        <label>Date of Birth</label>
        <div class="val" id="v-dob">—</div>
        <input type="date" id="i-dob">
      </div>
      <div class="pfield">
        <label>Age</label>
        <div class="val" id="v-age">—</div>
        <input type="number" id="i-age" placeholder="Age" min="10" max="60">
      </div>
      <div class="pfield">
        <label>Gender</label>
        <div class="val" id="v-gender">—</div>
        <select id="i-gender">
          <option value="" disabled selected>Select</option>
          <option>Male</option><option>Female</option><option>Other</option>
        </select>
      </div>
      <div class="pfield">
        <label>Mobile</label>
        <div class="val" id="v-mobile">—</div>
        <input type="tel" id="i-mobile" placeholder="+91 9876543210">
      </div>
      <div class="pfield">
        <label>Sport</label>
        <div class="val" id="v-sport">—</div>
        <select id="i-sport">
          <option value="" disabled selected>Select Sport</option>
          <option>Cricket</option><option>Football</option>
          <option>Basketball</option><option>Tennis</option>
          <option>Badminton</option><option>Athletics</option><option>Swimming</option>
        </select>
      </div>
      <div class="pfield">
        <label>Email</label>
        <div class="val" id="v-email">—</div>
        <input type="email" id="i-email" placeholder="email@example.com">
      </div>
      <div class="pfield">
        <label>Height (cm)</label>
        <div class="val" id="v-height">—</div>
        <input type="number" id="i-height" placeholder="175">
      </div>
      <div class="pfield">
        <label>Weight (kg)</label>
        <div class="val" id="v-weight">—</div>
        <input type="number" id="i-weight" placeholder="70">
      </div>
      <div class="pfield">

<div class="toast" id="toast">✅ Profile Saved!</div>

<script>
  // Particles
  const container = document.getElementById('particles');
  const colors = ['#3B82F6','#6EA8FE','#ffffff','#38BDF8'];
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'p';
    const size = Math.random() * 4 + 1.5;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
    container.appendChild(p);
  }

  // Profile Drawer
  function openProfile() {
    document.getElementById('profileDrawer').classList.add('open');
    document.getElementById('drawerBackdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeProfile() {
    document.getElementById('profileDrawer').classList.remove('open');
    document.getElementById('drawerBackdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  const fields = ['username','dob','age','gender','mobile','sport','email','height','weight','blood','address'];

  function toggleEdit() {
    fields.forEach(f => {
      document.getElementById('v-'+f).style.display = 'none';
      document.getElementById('i-'+f).style.display = 'block';
      const cur = document.getElementById('v-'+f).textContent;
      if (cur !== '—') document.getElementById('i-'+f).value = cur;
    });
    document.getElementById('editBtn').style.display = 'none';
    document.getElementById('saveBtn').style.display = 'flex';
    document.getElementById('cancelBtn').style.display = 'flex';
  }

  function saveProfile() {
    fields.forEach(f => {
      const val = document.getElementById('i-'+f).value.trim();
      document.getElementById('v-'+f).textContent = val || '—';
      document.getElementById('v-'+f).style.display = 'block';
      document.getElementById('i-'+f).style.display = 'none';
    });
    const uname = document.getElementById('i-username').value.trim();
    if (uname) {
      document.getElementById('drawerName').textContent = uname;
      document.getElementById('welcomeName').textContent = uname;
      document.getElementById('avatarInitial').textContent = uname[0].toUpperCase();
      document.getElementById('drawerAvatar').textContent = uname[0].toUpperCase();
    }
    document.getElementById('editBtn').style.display = 'flex';
    document.getElementById('saveBtn').style.display = 'none';
    document.getElementById('cancelBtn').style.display = 'none';
    showToast('✅ Profile Saved!');
  }

  function cancelEdit() {
    fields.forEach(f => {
      document.getElementById('v-'+f).style.display = 'block';
      document.getElementById('i-'+f).style.display = 'none';
    });
    document.getElementById('editBtn').style.display = 'flex';
    document.getElementById('saveBtn').style.display = 'none';
    document.getElementById('cancelBtn').style.display = 'none';
  }

  function setNav(el) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
