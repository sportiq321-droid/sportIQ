<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify - SportIQ</title>

    <!-- Tailwind tokens + CDN -->
    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Global CSS -->
    <link rel="stylesheet" href="css/global.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>

  <body
    class="font-display bg-background-light dark:bg-background-dark text-stone-900 dark:text-stone-100 min-h-screen"
    data-page="coachVerifyLand"
  >
    <div class="relative flex min-h-screen w-full flex-col">
      <!-- Header: back, centered title, notifications bell -->
      <header
        class="sticky top-0 z-20 flex items-center justify-between px-4 sm:px-6 lg:px-8 py-3 glassmorphic backdrop-blur-sm"
      >
        <button
          id="backBtn"
          class="flex size-10 sm:size-11 items-center justify-center rounded-full text-white/80 hover:text-white hover:bg-white/10 transition-all active:scale-95"
          aria-label="Back to previous page"
          title="Back"
        >
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1 class="text-lg sm:text-xl font-bold text-white">Verify</h1>
        <a
          href="notifications.html"
          class="relative flex size-10 sm:size-11 items-center justify-center text-white/70 hover:text-white hover:bg-white/10 rounded-full transition-all"
          aria-label="Notifications"
          data-notify-bell
        >
          <span class="material-symbols-outlined">notifications</span>
        </a>
      </header>

      <!-- Content - Responsive padding and spacing -->
      <main class="flex-1 p-4 sm:p-6 lg:p-8 pb-28 sm:pb-32">
        <div
          class="grid gap-4 sm:gap-6 lg:gap-8 grid-cols-1 sm:grid-cols-2 max-w-7xl mx-auto"
        >
          <!-- Assessments Card -->
          <article
            class="group relative overflow-hidden rounded-2xl glassmorphic shadow-lg hover:shadow-2xl transition-all duration-300 flex flex-col"
          >
            <div
              class="absolute inset-0 bg-primary/10 opacity-0 transition-opacity group-hover:opacity-100 pointer-events-none"
            ></div>
            <div class="relative flex flex-col flex-1">
              <!-- Image Section -->
              <div
                class="aspect-video w-full overflow-hidden bg-gradient-to-br from-blue-500/20 to-purple-500/20"
              >
                <img
                  alt="Assessment review illustration"
                  class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-105"
                  src="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=800&q=80"
                  loading="lazy"
                />
              </div>

              <!-- Content Section -->
              <div class="flex flex-col gap-3 sm:gap-4 p-4 sm:p-6 flex-1">
                <div class="flex items-start justify-between gap-4">
                  <div class="flex-1">
                    <h2 class="text-lg sm:text-xl font-bold text-white mb-2">
                      Assessments
                    </h2>
                    <p
                      class="text-sm sm:text-base text-white/70 leading-relaxed"
                    >
                      Review and approve pending physical assessments from
                      players
                    </p>
                  </div>
                </div>

                <!-- Action Button -->
                <a
                  href="coach-assessments.html"
                  class="flex h-11 sm:h-12 items-center justify-center gap-2 rounded-xl bg-primary text-white font-semibold shadow-lg hover:bg-primary/90 hover:shadow-xl transition-all duration-200 active:scale-95 mt-auto"
                  aria-label="View Assessments"
                >
                  <span class="material-symbols-outlined text-base sm:text-lg">
                    visibility
                  </span>
                  <span class="text-sm sm:text-base">View</span>
                </a>
              </div>
            </div>
          </article>

          <!-- Achievements Card -->
          <article
            class="group relative overflow-hidden rounded-2xl glassmorphic shadow-lg hover:shadow-2xl transition-all duration-300 flex flex-col"
          >
            <div
              class="absolute inset-0 bg-primary/10 opacity-0 transition-opacity group-hover:opacity-100 pointer-events-none"
            ></div>
            <div class="relative flex flex-col flex-1">
              <!-- Image Section -->
              <div
                class="aspect-video w-full overflow-hidden bg-gradient-to-br from-amber-500/20 to-orange-500/20"
              >
                <img
                  alt="Achievement verification illustration"
                  class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-105"
                  src="https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=800&q=80"
                  loading="lazy"
                />
              </div>

              <!-- Content Section -->
              <div class="flex flex-col gap-3 sm:gap-4 p-4 sm:p-6 flex-1">
                <div class="flex items-start justify-between gap-4">
                  <div class="flex-1">
                    <h2 class="text-lg sm:text-xl font-bold text-white mb-2">
                      Achievements
                    </h2>
                    <p
                      class="text-sm sm:text-base text-white/70 leading-relaxed"
                    >
                      Verify and validate player achievements and milestones
                    </p>
                  </div>
                </div>

                <!-- Action Button -->
                <a
                  href="coachVerify.html"
                  class="flex h-11 sm:h-12 items-center justify-center gap-2 rounded-xl bg-primary text-white font-semibold shadow-lg hover:bg-primary/90 hover:shadow-xl transition-all duration-200 active:scale-95 mt-auto"
                  aria-label="View Achievements"
                >
                  <span class="material-symbols-outlined text-base sm:text-lg">
                    visibility
                  </span>
                  <span class="text-sm sm:text-base">View</span>
                </a>
              </div>
            </div>
          </article>
        </div>
      </main>

      <!-- Bell dot helper -->
      <script type="module" src="js/notify-dot.js"></script>

      <!-- Coach bottom nav -->
      <script type="module" src="js/nav.js"></script>

      <!-- Smart back button handler -->
      <script>
        document
          .getElementById("backBtn")
          ?.addEventListener("click", function () {
            if (window.history.length > 1 && document.referrer) {
              window.history.back();
            } else {
              window.location.href = "dashboard.html";
            }
          });
      </script>
    </div>
  </body>
</html>
