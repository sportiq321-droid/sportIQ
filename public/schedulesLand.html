<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedules - SportIQ</title>

    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/schedules.css" />

    <style>
      :root {
        --blue-950: #020B18;
        --blue-900: #061527;
        --blue-800: #0A2040;
        --blue-700: #0D3060;
        --blue-600: #1146A0;
        --blue-500: #1A5FD4;
        --blue-400: #3B82F6;
        --blue-300: #6EA8FE;
        --blue-200: #A8CCFF;
        --white-pure: #FFFFFF;
        --white-warm: #F8FAFF;
        --white-ghost: #A8BBDA;
        --accent-sky: #38BDF8;
        --accent-cyan: #06B6D4;
        --card-bg: rgba(6,21,39,0.78);
        --border: rgba(59,130,246,0.20);
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: 'Rajdhani', sans-serif;
        background: var(--blue-950);
        color: var(--white-pure);
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }

      /* Background */
      body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background:
          radial-gradient(ellipse at 20% 20%, rgba(26,95,212,0.18) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 80%, rgba(56,189,248,0.07) 0%, transparent 50%),
          linear-gradient(135deg, #020B18 0%, #040F20 100%);
      }
      body::after {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image:
          linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* Particles */
      .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
      .p { position: absolute; border-radius: 50%; animation: floatUp linear infinite; opacity: 0; }
      @keyframes floatUp {
        0%   { transform: translateY(100vh) scale(0); opacity: 0; }
        10%  { opacity: 0.4; }
        90%  { opacity: 0.15; }
        100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
      }

      /* Page wrap */
      .page-wrap {
        position: relative; z-index: 1;
        display: flex; flex-direction: column; min-height: 100vh; width: 100%;
      }

      /* Header */
      header {
        position: sticky; top: 0; z-index: 20;
        background: rgba(2,11,24,0.92);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(59,130,246,0.14);
        animation: fadeDown .5s ease both;
      }
      @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .header-inner {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 16px;
      }
      @media(min-width:640px){ .header-inner { padding: 14px 24px; } }

      .header-title {
        font-family: 'Oswald', sans-serif;
        font-weight: 700; letter-spacing: .16em; text-transform: uppercase;
        color: var(--white-pure); font-size: 1.1rem;
      }
      @media(min-width:640px){ .header-title { font-size: 1.3rem; } }
      @media(min-width:1024px){ .header-title { font-size: 1.5rem; } }

      .header-btn {
        width: 38px; height: 38px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: var(--white-ghost);
        background: rgba(59,130,246,0.08);
        border: 1px solid rgba(59,130,246,0.15);
        transition: all .3s; cursor: pointer; text-decoration: none; flex-shrink: 0;
      }
      @media(min-width:640px){ .header-btn { width: 42px; height: 42px; } }
      .header-btn:hover { color: var(--white-pure); background: rgba(59,130,246,0.16); border-color: var(--blue-400); }
      .header-btn:active { transform: scale(.95); }

      /* Main */
      main {
        flex-grow: 1;
        padding: 24px 16px 112px;
        animation: fadeUp .5s ease .1s both;
      }
      @media(min-width:640px){ main { padding: 32px 24px 128px; } }
      @media(min-width:1024px){ main { padding: 40px 32px 128px; } }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .inner { max-width: 1280px; margin: 0 auto; width: 100%; }

      /* Tile grid */
      .tile-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
        max-width: 900px;
        margin: 0 auto;
      }
      @media(min-width:640px){ .tile-grid { grid-template-columns: 1fr 1fr; gap: 32px; } }

      /* Tile card */
      .tile-card {
        background: rgba(6,21,39,0.78);
        border: 1px solid rgba(59,130,246,0.20);
        border-radius: 16px;
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        position: relative; overflow: hidden;
        box-shadow: 0 16px 48px rgba(0,0,0,0.3);
        cursor: pointer;
        transition: transform .25s, box-shadow .25s, border-color .25s;
        display: block; text-decoration: none;
      }
      .tile-card::before {
        content: ''; position: absolute;
        top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, var(--blue-500), var(--accent-sky));
        z-index: 1;
      }
      .tile-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 24px 64px rgba(26,95,212,0.25);
        border-color: rgba(59,130,246,0.40);
      }
      .tile-card:active { transform: scale(.99); }

      /* Tile image */
      .tile-img-wrap {
        position: relative;
        aspect-ratio: 16/9;
        width: 100%; overflow: hidden;
      }
      .tile-img-wrap img {
        width: 100%; height: 100%; object-fit: cover;
        transition: transform .4s ease;
        display: block;
      }
      .tile-card:hover .tile-img-wrap img { transform: scale(1.04); }
      .tile-img-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(to top, rgba(2,11,24,0.7) 0%, transparent 60%);
      }

      /* Tile body */
      .tile-body {
        padding: 24px;
        display: flex; flex-direction: column; align-items: center;
        gap: 16px;
        text-align: center;
      }
      @media(min-width:640px){ .tile-body { padding: 32px; } }

      /* Icon ring */
      .tile-icon-ring {
        width: 64px; height: 64px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        background: rgba(59,130,246,0.12);
        border: 1px solid rgba(59,130,246,0.28);
        box-shadow: 0 0 20px rgba(59,130,246,0.15);
        flex-shrink: 0;
      }
      .tile-icon-ring .material-symbols-outlined {
        font-size: 36px; color: var(--blue-300);
      }

      /* Tile text */
      .tile-title {
        font-family: 'Oswald', sans-serif;
        font-size: 1.25rem; font-weight: 700;
        letter-spacing: .06em; color: var(--white-pure);
      }
      @media(min-width:640px){ .tile-title { font-size: 1.4rem; } }

      .tile-desc {
        font-size: .9rem; font-weight: 500;
        color: var(--white-ghost); line-height: 1.5;
        margin-top: -8px;
      }

      /* Tile action button */
      .tile-btn {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        width: 100%; min-height: 48px;
        padding: 0 24px;
        background: linear-gradient(135deg, #1A5FD4, #1146A0);
        border: none; border-radius: 10px;
        color: #fff;
        font-family: 'Rajdhani', sans-serif; font-weight: 700;
        font-size: .92rem; letter-spacing: .10em; text-transform: uppercase;
        box-shadow: 0 0 14px rgba(26,95,212,0.4);
        transition: box-shadow .25s;
        margin-top: 4px;
      }
      .tile-card:hover .tile-btn { box-shadow: 0 0 22px rgba(59,130,246,0.55); }
      @media(min-width:640px){ .tile-btn { min-height: 52px; } }
    </style>
  </head>

  <body data-page="schedules-landing">
    <div class="particles" id="particles"></div>

    <div class="page-wrap">

      <!-- HEADER -->
      <header>
        <div class="header-inner">
          <button id="backBtn" class="header-btn" aria-label="Back to previous page" title="Back">
            <span class="material-symbols-outlined" style="font-size:20px;">arrow_back</span>
          </button>
          <h1 class="header-title">Schedules</h1>
          <a href="notifications.html" class="header-btn" aria-label="Notifications" data-notify-bell style="position:relative;">
            <span class="material-symbols-outlined" style="font-size:20px;">notifications</span>
          </a>
        </div>
      </header>

      <!-- MAIN -->
      <main>
        <div class="inner">
          <div class="tile-grid">

            <!-- Create New Schedule Tile -->
            <article>
              <a href="schedules.html?view=create" class="tile-card">
                <div class="tile-img-wrap">
                  <img
                    alt="Players running - Create schedule"
                    src="https://images.unsplash.com/photo-1552674605-db6ffd4facb5?w=800&q=80"
                    loading="lazy"
                  />
                  <div class="tile-img-overlay"></div>
                </div>
                <div class="tile-body">
                  <div class="tile-icon-ring">
                    <span class="material-symbols-outlined">calendar_today</span>
                  </div>
                  <div>
                    <div class="tile-title">Create New Schedule</div>
                    <div class="tile-desc">Plan practice sessions, matches, or team events</div>
                  </div>
                  <div class="tile-btn">
                    <span class="material-symbols-outlined" style="font-size:18px;">add_circle</span>
                    <span>Create Schedule</span>
                  </div>
                </div>
              </a>
            </article>

            <!-- Player Requests Tile -->
            <article>
              <a href="schedules.html?view=requests" class="tile-card">
                <div class="tile-img-wrap">
                  <img
                    alt="Players standing in line - Requests"
                    src="https://images.unsplash.com/photo-1517466787929-bc90951d0974?w=800&q=80"
                    loading="lazy"
                  />
                  <div class="tile-img-overlay"></div>
                </div>
                <div class="tile-body">
                  <div class="tile-icon-ring">
                    <span class="material-symbols-outlined">groups</span>
                  </div>
                  <div>
                    <div class="tile-title">Player Requests</div>
                    <div class="tile-desc">Review and manage player schedule requests</div>
                  </div>
                  <div class="tile-btn">
                    <span class="material-symbols-outlined" style="font-size:18px;">people</span>
                    <span>View Requests</span>
                  </div>
                </div>
              </a>
            </article>

          </div>
        </div>
      </main>
    </div>

    <!-- SCRIPTS (preserved exactly) -->
    <script type="module" src="js/notify-dot.js"></script>
    <script type="module" src="js/nav.js"></script>

    <script>
      document.getElementById("backBtn")?.addEventListener("click", function () {
        if (window.history.length > 1 && document.referrer) {
          window.history.back();
        } else {
          window.location.href = "dashboard.html";
        }
      });
    </script>

    <!-- Particles -->
    <script>
      const pc = document.getElementById('particles');
      const cols = ['#3B82F6','#6EA8FE','#38BDF8','#ffffff'];
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'p';
        const s = Math.random() * 3 + 1.5;
        p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${9+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
        pc.appendChild(p);
      }
    </script>
  </body>
</html>
