<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sit-Up Assessment - SportIQ</title>

    <!-- Tailwind (project-wide tokens) -->
    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <!-- Global CSS -->
    <link rel="stylesheet" href="css/global.css" />

    <style>
      body[data-page="assess-situps"] {
        background: #0f1323 !important;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body data-page="assess-situps" class="font-display text-white min-h-screen">
    <div class="relative min-h-screen flex flex-col">
      <!-- Header: Back + Title + Notifications -->
      <header class="p-4 flex items-center justify-between">
        <button
          id="backBtn"
          onclick="history.back()"
          class="text-gray-300 hover:text-white transition-colors"
          aria-label="Back"
        >
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1 class="text-lg font-bold text-white flex-1 text-center">
          Sit-Up Assessment
        </h1>
        <a
          href="notifications.html"
          class="relative flex items-center justify-center text-gray-300 hover:text-white transition-colors"
          aria-label="Notifications"
          data-notify-bell
        >
          <span class="material-symbols-outlined">notifications</span>
        </a>
      </header>

      <!-- Main Content -->
      <div class="flex-grow px-4 pb-28">
        <!-- Mode Selection -->
        <section
          id="modeSection"
          class="glassmorphic rounded-xl p-5 border border-white/10 mb-4"
        >
          <h2 class="text-base font-semibold mb-3 text-white">Select Mode</h2>
          <div class="grid grid-cols-2 gap-3">
            <button
              id="liveCameraBtn"
              class="px-4 py-3 rounded-lg bg-primary text-white font-semibold hover:bg-primary/90 transition"
              type="button"
            >
              <span class="flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-lg">videocam</span>
                Live Camera
              </span>
            </button>
            <button
              id="uploadVideoBtn"
              class="px-4 py-3 rounded-lg bg-white/10 border border-white/10 hover:bg-white/15 transition text-white font-semibold"
              type="button"
            >
              <span class="flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-lg">upload</span>
                Upload Video
              </span>
            </button>
          </div>
        </section>

        <!-- Upload Section -->
        <section
          id="uploadSection"
          class="glassmorphic rounded-xl p-5 border border-white/10 mb-4 hidden"
        >
          <h2 class="text-base font-semibold mb-3 text-white">Upload Video</h2>
          <div class="space-y-3">
            <input
              type="file"
              id="videoFileInput"
              accept="video/mp4,video/webm"
              class="hidden"
            />
            <button
              id="chooseVideoBtn"
              class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/10 hover:bg-white/15 transition text-white font-semibold flex items-center justify-center gap-2"
            >
              <span class="material-symbols-outlined">folder_open</span>
              Choose Video File
            </button>
            <p class="text-xs text-white/60 text-center">
              MP4 or WebM • Max 20MB
            </p>
            <p
              id="uploadFileName"
              class="text-sm text-white/80 text-center hidden"
            ></p>
            <p
              id="uploadError"
              class="text-sm text-rose-400 text-center hidden"
              aria-live="assertive"
            ></p>
          </div>
        </section>

        <!-- Video Preview (Upload Mode) -->
        <div id="uploadPreviewArea" class="hidden mb-4">
          <div
            style="
              position: relative;
              width: 100%;
              aspect-ratio: 3/4;
              max-height: 70vh;
              background: #1f2937;
              border-radius: 0.75rem;
              overflow: hidden;
            "
          >
            <video
              id="uploadedVideoPreview"
              playsinline
              muted
              style="
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                background: black;
              "
            ></video>
            <canvas
              id="overlayCanvas"
              style="
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
              "
            ></canvas>
          </div>
        </div>

        <!-- Upload Controls -->
        <div id="uploadControls" class="flex gap-3 mb-4 hidden">
          <button
            id="startUploadBtn"
            class="flex-1 py-3 px-4 rounded-lg bg-primary text-white text-sm font-bold hover:bg-primary/90 transition"
            type="button"
          >
            Start Analysis
          </button>
          <button
            id="stopUploadBtn"
            class="flex-1 py-3 px-4 rounded-lg bg-amber-600 text-black text-sm font-bold hover:bg-amber-500 transition hidden"
            type="button"
          >
            Stop
          </button>
        </div>

        <!-- Stats HUD (Upload Mode) -->
        <div id="statsHUD" class="grid grid-cols-3 gap-3 mb-4 hidden">
          <div
            class="bg-primary/10 dark:bg-primary/20 rounded-xl p-4 text-center border border-white/10"
          >
            <p class="text-sm text-white/70">Reps</p>
            <p id="repCount" class="text-2xl font-bold text-white">0</p>
          </div>
          <div
            class="bg-primary/10 dark:bg-primary/20 rounded-xl p-4 text-center border border-white/10"
          >
            <p class="text-sm text-white/70">Timer</p>
            <p id="timerText" class="text-2xl font-bold text-white">00:00</p>
          </div>
          <div
            class="bg-primary/10 dark:bg-primary/20 rounded-xl p-4 text-center border border-white/10"
          >
            <p class="text-sm text-white/70">Confidence</p>
            <p id="confidenceText" class="text-xl font-bold text-white">—</p>
          </div>
        </div>
      </div>

      <!-- THE OLD SUMMARY MODAL HAS BEEN DELETED FROM HERE -->
    </div>

    <!-- Bell dot helper -->
    <script type="module" src="js/notify-dot.js"></script>

    <!-- Controller -->
    <script type="module" src="js/assessments/situps.js"></script>

    <!-- Shared bottom nav (Player) -->
    <script type="module" src="js/nav.js"></script>
  </body>
</html>
