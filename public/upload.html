<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Achievement - SportIQ</title>

    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/upload.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Rajdhani:wght@500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <style>
      :root {
        --blue-950: #020B18;
        --blue-900: #061527;
        --blue-800: #0A2040;
        --blue-700: #0D3060;
        --blue-600: #1146A0;
        --blue-500: #1A5FD4;
        --blue-400: #3B82F6;
        --blue-300: #6EA8FE;
        --blue-200: #A8CCFF;
        --white-pure: #FFFFFF;
        --white-warm: #F8FAFF;
        --white-ghost: #A8BBDA;
        --accent-sky: #38BDF8;
        --accent-cyan: #06B6D4;
        --card-bg: rgba(6,21,39,0.78);
        --border: rgba(59,130,246,0.20);
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: 'Rajdhani', sans-serif;
        background: var(--blue-950);
        color: var(--white-pure);
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background:
          radial-gradient(ellipse at 20% 20%, rgba(26,95,212,0.18) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 80%, rgba(56,189,248,0.07) 0%, transparent 50%),
          linear-gradient(135deg, #020B18 0%, #040F20 100%);
      }
      body::after {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image:
          linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
      .p { position: absolute; border-radius: 50%; animation: floatUp linear infinite; opacity: 0; }
      @keyframes floatUp {
        0%   { transform: translateY(100vh) scale(0); opacity: 0; }
        10%  { opacity: 0.4; }
        90%  { opacity: 0.15; }
        100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
      }

      .page-wrap {
        position: relative; z-index: 1;
        display: flex; flex-direction: column;
        min-height: 100vh; width: 100%;
        max-width: 576px; margin: 0 auto;
      }

      /* Header */
      header {
        position: sticky; top: 0; z-index: 20;
        background: rgba(2,11,24,0.92);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(59,130,246,0.14);
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 16px;
        animation: fadeDown .5s ease both;
      }
      @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-14px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      header h1 {
        font-family: 'Oswald', sans-serif;
        font-size: 1.1rem; font-weight: 700;
        letter-spacing: .16em; text-transform: uppercase;
        color: var(--white-pure);
      }

      .header-btn {
        width: 38px; height: 38px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: var(--white-ghost);
        background: rgba(59,130,246,0.08);
        border: 1px solid rgba(59,130,246,0.15);
        transition: all .3s; cursor: pointer; text-decoration: none;
        flex-shrink: 0;
      }
      .header-btn:hover { color: var(--white-pure); background: rgba(59,130,246,0.16); border-color: var(--blue-400); }
      .header-btn:active { transform: scale(.95); }

      /* Main */
      main {
        flex: 1; padding: 16px 16px 96px;
        animation: fadeUp .5s ease .1s both;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Upload container (replaces glassmorphic rounded-xl) */
      .upload-container {
        background: rgba(6,21,39,0.78);
        border: 1px solid rgba(59,130,246,0.20);
        border-radius: 14px;
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        position: relative; overflow: hidden;
        padding: 24px;
        box-shadow: 0 16px 48px rgba(0,0,0,0.3);
      }
      .upload-container::before {
        content: ''; position: absolute;
        top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, var(--blue-500), var(--accent-sky));
      }

      /* Section title */
      .section-title {
        font-family: 'Oswald', sans-serif;
        font-size: 1.2rem; font-weight: 700;
        letter-spacing: .08em; color: var(--white-pure);
        margin-bottom: 20px;
      }

      /* Form labels */
      .form-label {
        display: block;
        font-size: .72rem; font-weight: 700;
        letter-spacing: .14em; text-transform: uppercase;
        color: var(--blue-300); margin-bottom: 7px;
      }

      /* Inputs */
      input[type="text"],
      input[type="date"],
      select,
      textarea {
        width: 100%;
        background: rgba(59,130,246,0.07);
        border: 1px solid rgba(59,130,246,0.22);
        border-radius: 10px;
        color: var(--white-pure);
        font-family: 'Rajdhani', sans-serif;
        font-size: .95rem; font-weight: 500;
        outline: none;
        transition: border-color .2s, box-shadow .2s;
        padding: 0 14px;
        height: 48px;
        -webkit-appearance: none; appearance: none;
      }
      textarea { height: auto; min-height: 110px; padding: 12px 14px; resize: vertical; }
      input::placeholder, textarea::placeholder { color: var(--white-ghost); opacity: .7; }
      input:focus, select:focus, textarea:focus {
        border-color: var(--blue-400);
        box-shadow: 0 0 0 3px rgba(59,130,246,0.10);
      }
      select option { background: #061527; color: #fff; }

      /* Input box spacing */
      .input-box { margin-bottom: 16px; }
      .input-box:last-child { margin-bottom: 0; }

      /* Parent grid */
      .parent { display: grid; grid-template-columns: 1fr; gap: 0; }
      @media(min-width:768px){
        .parent { grid-template-columns: 1fr auto; gap: 24px; }
        .div2 { display: block !important; }
      }

      /* Next / Save button */
      .btn-primary-full {
        display: flex; align-items: center; justify-content: center;
        width: 100%; height: 48px; margin-top: 20px;
        background: linear-gradient(135deg, #1A5FD4, #1146A0);
        border: none; border-radius: 10px; color: #fff;
        font-family: 'Rajdhani', sans-serif; font-weight: 700;
        font-size: 1rem; letter-spacing: .10em; text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 0 14px rgba(26,95,212,0.4);
        transition: box-shadow .25s, transform .2s;
      }
      .btn-primary-full:hover { box-shadow: 0 0 22px rgba(59,130,246,0.55); transform: translateY(-1px); }
      .btn-primary-full:active { transform: scale(.99); }

      /* Section 2 */
      #section-2 { padding-top: 4px; }

      .section-subtitle {
        font-size: .88rem; font-weight: 500;
        color: var(--white-ghost); text-align: center;
        margin-bottom: 20px; line-height: 1.5;
      }

      /* Capture / Upload tiles */
      .proof-tiles {
        display: grid; grid-template-columns: 1fr 1fr;
        gap: 14px; margin-bottom: 24px;
      }

      .proof-tile {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 24px 16px;
        background: rgba(59,130,246,0.07);
        border: 2px dashed rgba(59,130,246,0.30);
        border-radius: 12px;
        color: var(--white-pure);
        cursor: pointer; text-decoration: none;
        transition: background .2s, border-color .2s;
        gap: 8px;
      }
      .proof-tile:hover { background: rgba(59,130,246,0.15); border-color: var(--blue-400); }
      .proof-tile .material-symbols-outlined { font-size: 36px; color: var(--blue-300); }
      .proof-tile span:last-child { font-size: .88rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }

      /* Preview section */
      .preview-heading {
        font-family: 'Oswald', sans-serif;
        font-size: 1rem; font-weight: 700;
        letter-spacing: .06em; color: var(--white-pure);
        margin-bottom: 12px;
      }

      .preview-container {
        position: relative; width: 100%;
        background: rgba(59,130,246,0.05);
        border: 1px solid rgba(59,130,246,0.15);
        border-radius: 12px; overflow: hidden;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 16px;
      }

      .preview-wrap { width: 100%; }
      .preview-wrap img { width: 100%; display: block; border-radius: 10px; }
      .preview-meta { font-size: .78rem; color: var(--white-ghost); padding: 8px 12px; }

      #emptyPreviewHint {
        text-align: center; padding: 40px 16px;
        color: var(--white-ghost); font-size: .88rem; font-weight: 500;
      }

      /* Delete preview btn */
      #deletePreviewBtn {
        position: absolute; top: 10px; right: 10px;
        width: 34px; height: 34px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        background: rgba(239,68,68,0.08);
        border: 1px solid rgba(239,68,68,0.25);
        color: #f87171; cursor: pointer;
        transition: background .2s, color .2s;
      }
      #deletePreviewBtn:hover { background: rgba(239,68,68,0.20); color: #fff; }

      /* Big save button */
      #saveProxy {
        display: flex; align-items: center; justify-content: center;
        width: 100%; height: 56px;
        background: linear-gradient(135deg, #1A5FD4, #1146A0);
        border: none; border-radius: 12px; color: #fff;
        font-family: 'Rajdhani', sans-serif; font-weight: 700;
        font-size: 1.05rem; letter-spacing: .10em; text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 0 24px rgba(26,95,212,0.45);
        transition: box-shadow .25s, transform .2s;
      }
      #saveProxy:hover { box-shadow: 0 0 32px rgba(59,130,246,0.6); transform: translateY(-1px); }
      #saveProxy:active { transform: scale(.99); }

      #saveHint {
        margin-top: 8px; text-align: center;
        font-size: .78rem; font-weight: 600;
        color: var(--blue-300);
      }
      #saveHint.hidden { display: none !important; }

      /* Keep upload-section classes from upload.css working */
      .upload-section { display: none; }
      .upload-section.active { display: block; }

      /* sr-only */
      .sr-only {
        position: absolute; width: 1px; height: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
    </style>
  </head>

  <body data-page="upload.html" data-header-title="Upload Achievement" data-header-back="achievements.html">
    <div class="particles" id="particles"></div>

    <div class="page-wrap">

      <main>
        <div class="upload-container">

          <!-- SECTION 1 -->
          <div id="section-1" class="upload-section active">
            <h2 class="section-title">Achievement Details</h2>

            <div class="parent gap-4">
              <div class="div1">

                <div class="input-box">
                  <label class="form-label">Tournament Name</label>
                  <input type="text" id="title" placeholder="Tournament name" required />
                </div>

                <div class="input-box">
                  <label class="form-label">Sport</label>
                  <select id="sportCategory">
                    <option value="">Select sport</option>
                    <option>Cricket</option>
                    <option>Football</option>
                    <option>Kabaddi</option>
                    <option>Volleyball</option>
                    <option>Badminton</option>
                  </select>
                </div>

                <div class="input-box">
                  <label class="form-label">Date</label>
                  <input type="date" id="date" required />
                </div>

                <div class="input-box">
                  <label class="form-label">Venue</label>
                  <input type="text" id="venue" placeholder="Venue" required />
                </div>

                <div class="input-box">
                  <label class="form-label">Description</label>
                  <textarea id="description" placeholder="Write about your achievement"></textarea>
                </div>
              </div>

              <div class="div2 hidden"></div>
            </div>

            <button class="btn-primary-full" id="nextBtn">Next</button>
          </div>

          <!-- SECTION 2 -->
          <div id="section-2" class="upload-section">
            <h2 class="section-title">Proof</h2>
            <p class="section-subtitle">
              Capture or upload proof of your achievement. For faster uploads, we recommend compressing your files.
            </p>

            <div class="proof-tiles">
              <button id="captureBtn" type="button" class="proof-tile">
                <span class="material-symbols-outlined">photo_camera</span>
                <span>Capture</span>
              </button>
              <label for="proof" class="proof-tile">
                <span class="material-symbols-outlined">upload_file</span>
                <span>Upload</span>
              </label>
            </div>

            <input type="file" id="proof" accept="image/*" class="sr-only" />

            <div class="preview-heading">Preview</div>
            <div class="preview-container">
              <div class="w-full">
                <div id="previewWrap" class="preview-wrap" hidden>
                  <img id="previewImg" alt="Certificate preview" />
                  <div class="preview-meta text-white/70">
                    <span id="previewSize"></span>
                  </div>
                </div>
                <div id="emptyPreviewHint">No file selected yet.</div>
              </div>
              <button id="deletePreviewBtn" type="button" title="Remove" aria-label="Remove">
                <span class="material-symbols-outlined" style="font-size:18px;">delete</span>
              </button>
            </div>

            <button id="saveProxy" type="button">Save Achievement</button>
            <p id="saveHint" class="hidden">
              Certificate saved. Tap Save again to submit the achievement.
            </p>
          </div>

          <!-- Legacy Step 2 buttons (kept for logic; visually hidden) -->
          <div class="btn-group inline sr-only">
            <button class="btn-small" id="saveCertBtn">Save Certificate</button>
            <button class="btn-small logout" id="replaceCertBtn">Replace</button>
          </div>

          <!-- Wizard controls (hidden) -->
          <div class="btn-group bottom sr-only">
            <button class="btn-small dashboard" id="prevBtn">⬅ Previous</button>
            <button class="btn-small" id="finalSave">✅ Save</button>
            <button class="btn-small logout" id="cancelBtn">❌ Cancel</button>
          </div>

        </div>
      </main>

      <!-- Smart back (preserved exactly) -->
      <script type="module">
        const back = document.getElementById("backBtn");
        back?.addEventListener("click", (e) => {
          e.preventDefault();
          try {
            const ref = document.referrer || "";
            const hasHistory = window.history.length > 1;
            const sameOrigin =
              ref &&
              new URL(ref, window.location.href).origin === window.location.origin;
            if ((sameOrigin && ref !== window.location.href) || hasHistory) {
              window.history.back();
              return;
            }
          } catch {}
          window.location.href = "achievements.html";
        });
      </script>

      <!-- Proxies (preserved exactly) -->
      <script type="module">
        const proof = document.getElementById("proof");
        const captureBtn = document.getElementById("captureBtn");
        const saveProxy = document.getElementById("saveProxy");
        const deletePreviewBtn = document.getElementById("deletePreviewBtn");
        const saveCertBtn = document.getElementById("saveCertBtn");
        const replaceCertBtn = document.getElementById("replaceCertBtn");
        const finalSaveBtn = document.getElementById("finalSave");
        const previewWrap = document.getElementById("previewWrap");
        const previewImg = document.getElementById("previewImg");
        const emptyPreviewHint = document.getElementById("emptyPreviewHint");
        const saveHint = document.getElementById("saveHint");

        let certSaved = false;

        function syncCertSaved() {
          certSaved =
            !!previewWrap &&
            !previewWrap.hasAttribute("hidden") &&
            !!(previewImg && previewImg.src && previewImg.src.length > 0);
          if (saveHint) saveHint.classList.toggle("hidden", !certSaved);
        }

        captureBtn?.addEventListener("click", () => {
          try { proof.setAttribute("capture", "environment"); } catch {}
          proof?.click();
        });

        proof?.addEventListener("change", () => {
          certSaved = false;
          if (saveHint) saveHint.classList.add("hidden");
        });

        saveProxy?.addEventListener("click", () => {
          const hasFile = proof?.files && proof.files.length > 0;
          syncCertSaved();
          if (hasFile && !certSaved) {
            saveCertBtn?.click();
            setTimeout(() => { syncCertSaved(); }, 250);
            return;
          }
          finalSaveBtn?.click();
        });

        deletePreviewBtn?.addEventListener("click", () => {
          replaceCertBtn?.click();
          certSaved = false;
          if (emptyPreviewHint) emptyPreviewHint.style.display = "";
          if (saveHint) saveHint.classList.add("hidden");
        });

        replaceCertBtn?.addEventListener("click", () => {
          certSaved = false;
          if (saveHint) saveHint.classList.add("hidden");
        });

        const mo = new MutationObserver(syncCertSaved);
        if (previewWrap) mo.observe(previewWrap, { attributes: true, attributeFilter: ["hidden"] });
      </script>

      <!-- Bell dot helper -->
      <script type="module" src="js/notify-dot.js"></script>

      <!-- Page controller (preserved exactly) -->
      <script type="module" src="js/upload.js"></script>

      <!-- Bottom nav -->
      <script type="module" src="js/nav.js"></script>
    </div>

    <!-- Particles -->
    <script>
      const pc = document.getElementById('particles');
      const cols = ['#3B82F6','#6EA8FE','#38BDF8','#ffffff'];
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'p';
        const s = Math.random() * 3 + 1.5;
        p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${9+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
        pc.appendChild(p);
      }
    </script>
  </body>
</html>
