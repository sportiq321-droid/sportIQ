<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Achievement - SportIQ</title>

    <!-- Tailwind tokens + CDN -->
    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Global + page CSS (keep upload.css for Step 2 styles and legacy controls) -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/upload.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>
  <body
    class="font-display bg-background-light dark:bg-background-dark text-stone-900 dark:text-stone-100 min-h-screen"
    data-page="upload.html"
  >
    <div class="relative flex min-h-screen w-full flex-col max-w-xl mx-auto">
      <!-- Header: smart back, centered title, notifications bell with dot -->
      <header
        class="sticky top-0 z-20 flex items-center justify-between bg-background-light/80 px-4 py-3 backdrop-blur-sm dark:bg-background-dark/80"
      >
        <a
          href="achievements.html"
          id="backBtn"
          class="flex size-10 items-center justify-center rounded-full text-stone-900 dark:text-stone-100"
          aria-label="Back"
          title="Back"
        >
          <span class="material-symbols-outlined"> arrow_back </span>
        </a>
        <h1 class="text-lg font-bold">Upload Achievement</h1>
        <a
          href="notifications.html"
          class="relative flex size-10 items-center justify-center text-stone-300 hover:text-white transition"
          aria-label="Notifications"
          data-notify-bell
        >
          <span class="material-symbols-outlined"> notifications </span>
        </a>
      </header>

      <main class="flex-1 p-4">
        <div class="upload-container glassmorphic rounded-xl">
          <!-- ========== SECTION 1 (unchanged logic; modern styling only) ========== -->
          <div id="section-1" class="upload-section active">
            <h2 class="section-title text-white text-xl font-bold mb-4">
              Achievement Details
            </h2>

            <div class="parent gap-4">
              <div class="div1">
                <!-- Tournament Name -->
                <div class="input-box">
                  <label class="block mb-1 text-white/80"
                    >Tournament Name</label
                  >
                  <input
                    type="text"
                    id="title"
                    placeholder="Tournament name"
                    required
                    class="form-input w-full h-12 rounded-lg bg-white/10 border border-white/20 text-white placeholder:text-white/50 focus:outline-none focus:ring-2 focus:ring-primary px-3"
                  />
                </div>

                <!-- Sport -->
                <div class="input-box">
                  <label class="block mb-1 text-white/80">Sport</label>
                  <select
                    id="sportCategory"
                    class="form-select w-full h-12 rounded-lg bg-white/10 border border-white/20 text-white focus:outline-none focus:ring-2 focus:ring-primary px-3"
                  >
                    <option value="">Select sport</option>
                    <option>Cricket</option>
                    <option>Football</option>
                    <option>Kabaddi</option>
                    <option>Volleyball</option>
                    <option>Badminton</option>
                  </select>
                </div>

                <!-- Date -->
                <div class="input-box">
                  <label class="block mb-1 text-white/80">Date</label>
                  <input
                    type="date"
                    id="date"
                    required
                    class="form-input w-full h-12 rounded-lg bg-white/10 border border-white/20 text-white focus:outline-none focus:ring-2 focus:ring-primary px-3"
                  />
                </div>

                <!-- Venue -->
                <div class="input-box">
                  <label class="block mb-1 text-white/80">Venue</label>
                  <input
                    type="text"
                    id="venue"
                    placeholder="Venue"
                    required
                    class="form-input w-full h-12 rounded-lg bg-white/10 border border-white/20 text-white placeholder:text-white/50 focus:outline-none focus:ring-2 focus:ring-primary px-3"
                  />
                </div>

                <!-- Description -->
                <div class="input-box">
                  <label class="block mb-1 text-white/80">Description</label>
                  <textarea
                    id="description"
                    placeholder="Write about your achievement"
                    class="form-textarea w-full min-h-[110px] rounded-lg bg-white/10 border border-white/20 text-white placeholder:text-white/50 focus:outline-none focus:ring-2 focus:ring-primary px-3 py-2"
                  ></textarea>
                </div>
              </div>

              <!-- Right helper area (kept empty) -->
              <div class="div2 hidden md:block"></div>
            </div>

            <div class="btn-row mt-4">
              <button
                class="btn btn-neon-blue btn-pill w-full h-12 text-white font-semibold"
                id="nextBtn"
              >
                Next
              </button>
            </div>
          </div>

          <!-- ========== SECTION 2 (NEW UI; logic/IDs unchanged) ========== -->
          <div id="section-2" class="upload-section">
            <h2 class="section-title text-white text-xl font-bold">Proof</h2>
            <p class="text-sm text-white/70 text-center mb-3">
              Capture or upload proof of your achievement. For faster uploads,
              we recommend compressing your files.
            </p>

            <!-- Capture / Upload tiles -->
            <div class="grid grid-cols-2 gap-4 mb-6">
              <button
                id="captureBtn"
                type="button"
                class="flex flex-col items-center justify-center p-6 rounded-xl glassmorphic border-2 border-dashed border-primary/50 hover:bg-primary/20 transition-colors"
              >
                <span class="material-symbols-outlined text-4xl text-primary"
                  >photo_camera</span
                >
                <span class="mt-2 text-sm font-medium text-white">Capture</span>
              </button>

              <!-- Label opens picker natively (avoid double open by not adding JS click) -->
              <label
                for="proof"
                class="flex flex-col items-center justify-center p-6 rounded-xl glassmorphic border-2 border-dashed border-primary/50 hover:bg-primary/20 transition-colors cursor-pointer"
              >
                <span class="material-symbols-outlined text-4xl text-primary"
                  >upload_file</span
                >
                <span class="mt-2 text-sm font-medium text-white">Upload</span>
              </label>
            </div>

            <!-- Hidden real input used by js/upload.js -->
            <input type="file" id="proof" accept="image/*" class="sr-only" />

            <!-- Preview -->
            <h3 class="text-white font-bold mb-3">Preview</h3>
            <div
              class="relative w-full rounded-xl overflow-hidden glassmorphic flex items-center justify-center"
            >
              <div class="w-full">
                <div id="previewWrap" class="preview-wrap" hidden>
                  <img
                    id="previewImg"
                    alt="Certificate preview"
                    class="rounded-lg"
                  />
                  <div class="preview-meta text-white/70">
                    <span id="previewSize"></span>
                  </div>
                </div>
                <!-- Empty state helper (shown by default via CSS hidden attr on previewWrap) -->
                <div
                  id="emptyPreviewHint"
                  class="text-center text-white/50 py-8"
                >
                  No file selected yet.
                </div>
              </div>

              <!-- Delete preview (proxy) -->
              <button
                id="deletePreviewBtn"
                type="button"
                class="absolute top-3 right-3 p-2 rounded-full bg-black/30 text-white/80 hover:bg-black/50 hover:text-white transition-colors"
                title="Remove"
                aria-label="Remove"
              >
                <span class="material-symbols-outlined text-xl">delete</span>
              </button>
            </div>

            <!-- Big Save (two-click logic: first saves cert, second final-saves) -->
            <button
  id="saveProxy"
  type="button"
  class="w-full h-14 bg-primary text-white font-bold rounded-xl shadow-[0_10px_30px_-5px_rgba(96,122,251,0.5)] hover:bg-primary/90 transition-all duration-200 active:scale-95"
>
  Save Achievement
</button>
              <p
                id="saveHint"
                class="mt-2 text-center text-xs text-white/60 hidden"
              >
                Certificate saved. Tap Save again to submit the achievement.
              </p>
            </div>

            <!-- Legacy Step 2 buttons (kept for logic; visually hidden) -->
            <div class="btn-group inline sr-only">
              <button class="btn-small" id="saveCertBtn">
                Save Certificate
              </button>
              <button class="btn-small logout" id="replaceCertBtn">
                Replace
              </button>
            </div>

            <!-- Wizard controls (hidden as requested) -->
            <div class="btn-group bottom sr-only">
              <button class="btn-small dashboard" id="prevBtn">
                ⬅ Previous
              </button>
              <button class="btn-small" id="finalSave">✅ Save</button>
              <button class="btn-small logout" id="cancelBtn">❌ Cancel</button>
            </div>
          </div>
        </div>
      </main>

      <!-- Smart back: last page; fallback to achievements.html -->
      <script type="module">
        const back = document.getElementById("backBtn");
        back?.addEventListener("click", (e) => {
          e.preventDefault();
          try {
            const ref = document.referrer || "";
            const hasHistory = window.history.length > 1;
            const sameOrigin =
              ref &&
              new URL(ref, window.location.href).origin ===
                window.location.origin;

            if ((sameOrigin && ref !== window.location.href) || hasHistory) {
              window.history.back();
              return;
            }
          } catch {}
          window.location.href = "achievements.html";
        });
      </script>

      <!-- Proxies (Step 2 only) -->
      <script type="module">
        const proof = document.getElementById("proof");
        const captureBtn = document.getElementById("captureBtn");
        const saveProxy = document.getElementById("saveProxy");
        const deletePreviewBtn = document.getElementById("deletePreviewBtn");

        const saveCertBtn = document.getElementById("saveCertBtn");
        const replaceCertBtn = document.getElementById("replaceCertBtn");
        const finalSaveBtn = document.getElementById("finalSave");
        const previewWrap = document.getElementById("previewWrap");
        const previewImg = document.getElementById("previewImg");
        const emptyPreviewHint = document.getElementById("emptyPreviewHint");
        const saveHint = document.getElementById("saveHint");

        // internal flag: has the certificate been saved (preview visible)?
        let certSaved = false;

        function syncCertSaved() {
          certSaved =
            !!previewWrap &&
            !previewWrap.hasAttribute("hidden") &&
            !!(previewImg && previewImg.src && previewImg.src.length > 0);
          // toggle hint visibility
          if (saveHint) saveHint.classList.toggle("hidden", !certSaved);
        }

        // When user captures via camera
        captureBtn?.addEventListener("click", () => {
          try {
            proof.setAttribute("capture", "environment");
          } catch {}
          proof?.click();
        });

        // When file input changes, we have a selected file but not yet "saved"
        proof?.addEventListener("change", () => {
          // reset certSaved until user presses Save Certificate
          certSaved = false;
          if (saveHint) saveHint.classList.add("hidden");
        });

        // Big Save:
        //  - If a file is chosen but not yet compressed/previewed → save certificate only.
        //  - If already previewed (certificate saved) OR no file chosen → final save.
        saveProxy?.addEventListener("click", () => {
          const hasFile = proof?.files && proof.files.length > 0;
          syncCertSaved();

          if (hasFile && !certSaved) {
            // First click: save the certificate only
            saveCertBtn?.click();
            // After preview updates, set certSaved true and show hint
            setTimeout(() => {
              syncCertSaved();
            }, 250);
            return; // stop here (do not final save yet)
          }

          // Second click (or no file scenario): final save
          finalSaveBtn?.click();
        });

        // Delete icon → forwards to Replace (clears preview)
        deletePreviewBtn?.addEventListener("click", () => {
          replaceCertBtn?.click();
          certSaved = false;
          if (emptyPreviewHint) emptyPreviewHint.style.display = "";
          if (saveHint) saveHint.classList.add("hidden");
        });

        // Also clear the flag if Replace is clicked elsewhere (safety)
        replaceCertBtn?.addEventListener("click", () => {
          certSaved = false;
          if (saveHint) saveHint.classList.add("hidden");
        });

        // In case another code path shows the preview, keep flag in sync
        const mo = new MutationObserver(syncCertSaved);
        if (previewWrap)
          mo.observe(previewWrap, {
            attributes: true,
            attributeFilter: ["hidden"],
          });
      </script>

      <!-- Bell dot helper -->
      <script type="module" src="js/notify-dot.js"></script>

      <!-- Page controller (unchanged logic) -->
      <script type="module" src="js/upload.js"></script>

      <!-- Bottom nav for Player -->
      <script type="module" src="js/nav.js"></script>
    </div>
  </body>
</html>
