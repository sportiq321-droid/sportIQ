<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportIQ - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Cinzel:wght@700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue-950: #020B18;
    --blue-900: #061527;
    --blue-800: #0A2040;
    --blue-700: #0D3060;
    --blue-600: #1146A0;
    --blue-500: #1A5FD4;
    --blue-400: #3B82F6;
    --blue-300: #6EA8FE;
    --blue-200: #A8CCFF;
    --blue-100: #D6E8FF;
    --blue-50:  #EEF5FF;
    --white-pure:  #FFFFFF;
    --white-warm:  #F8FAFF;
    --white-muted: #EDF2FB;
    --white-dim:   #D1DCEF;
    --white-ghost: #A8BBDA;
    --accent-sky:  #38BDF8;
    --accent-cyan: #06B6D4;
    --accent-ice:  #BAE6FD;
  }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    background: var(--blue-950);
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* ── BG ── */
  .bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(26,95,212,0.2) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 30%, rgba(59,130,246,0.15) 0%, transparent 50%),
      linear-gradient(135deg, var(--blue-950) 0%, var(--blue-900) 50%, var(--blue-950) 100%);
  }
  .olympic-img {
    position: fixed; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.13; mix-blend-mode: luminosity;
    animation: imgBreath 8s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes imgBreath {
    0%,100% { opacity: 0.10; transform: scale(1.00); }
    50%      { opacity: 0.18; transform: scale(1.03); }
  }
  .overlay {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
  }
  .light-leak {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 85% 85%, rgba(59,130,246,0.12) 0%, transparent 55%);
    pointer-events: none;
  }

  /* ── PARTICLES ── */
  .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
  .p { position: absolute; border-radius: 50%; animation: floatUp linear infinite; opacity: 0; }
  @keyframes floatUp {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
  }

  /* ── CARD ── */
  .card {
    position: relative; z-index: 10;
    background: rgba(6,21,39,0.65);
    border: 1px solid rgba(59,130,246,0.20);
    border-radius: 24px;
    padding: 44px 52px 48px;
    width: 100%; max-width: 460px;
    backdrop-filter: blur(24px) saturate(1.5);
    box-shadow:
      0 0 0 1px rgba(59,130,246,0.07),
      0 0 80px rgba(59,130,246,0.07),
      0 40px 80px rgba(0,0,0,0.7);
    animation: cardReveal 0.9s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardReveal {
    from { opacity:0; transform: translateY(40px) scale(0.96); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  .card::before, .card::after {
    content: ''; position: absolute;
    width: 36px; height: 36px;
    border-color: var(--blue-400); border-style: solid; opacity: 0.6;
  }
  .card::before { top:14px; left:14px; border-width:2px 0 0 2px; border-radius:6px 0 0 0; }
  .card::after  { bottom:14px; right:14px; border-width:0 2px 2px 0; border-radius:0 0 6px 0; }

  /* ── LOGO / TITLE ── */
  .logo-wrap {
    text-align: center; margin-bottom: 28px;
    animation: fadeUp 0.7s ease 0.3s both;
  }
  .logo-icon {
    width: 52px; height: 52px; margin: 0 auto 10px;
    border: 2px solid var(--blue-400);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(59,130,246,0.4);
    animation: ringPulse 3s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%,100% { box-shadow: 0 0 16px rgba(59,130,246,0.4); }
    50%      { box-shadow: 0 0 36px rgba(59,130,246,0.8), 0 0 60px rgba(26,95,212,0.3); }
  }
  .logo-icon svg { width:28px; height:28px; fill:var(--blue-400); }
  .brand {
    font-family: 'Cinzel', serif;
    font-size: 1rem; letter-spacing: .3em;
    color: rgba(255,255,255,0.5); text-transform: uppercase;
    margin-bottom: 4px;
  }
  .title {
    font-family: 'Oswald', sans-serif;
    font-size: 1.8rem; letter-spacing: .12em;
    color: #fff; font-weight: 700;
  }
  .title span { color: var(--blue-400); }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.25), transparent);
    margin: 0 0 28px;
  }

  /* ── FORM ── */
  .field {
    position: relative; margin-bottom: 18px;
    animation: fadeUp 0.6s ease both;
  }
  .field:nth-child(1) { animation-delay: 0.5s; }
  .field:nth-child(2) { animation-delay: 0.65s; }

  .field label {
    display: block;
    font-size: 0.78rem; font-weight: 700;
    letter-spacing: .15em; text-transform: uppercase;
    color: rgba(59,130,246,0.7);
    margin-bottom: 7px;
  }
  .field-inner {
    position: relative;
    display: flex; align-items: center;
  }
  .field-inner > svg {
    position: absolute; left: 14px;
    width: 18px; height: 18px;
    stroke: rgba(59,130,246,0.5); fill: none;
    stroke-width: 2; pointer-events: none;
    transition: stroke .3s;
  }
  .field input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: rgba(59,130,246,0.05);
    border: 1px solid rgba(59,130,246,0.18);
    border-radius: 10px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; font-weight: 500;
    letter-spacing: .04em;
    outline: none;
    transition: border-color .3s, box-shadow .3s, background .3s;
  }
  .field input::placeholder { color: rgba(255,255,255,0.28); }
  .field input:focus {
    border-color: var(--blue-400);
    background: rgba(59,130,246,0.08);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.12), 0 0 20px rgba(59,130,246,0.08);
  }
  .field input:focus + svg, .field-inner:focus-within > svg {
    stroke: var(--blue-400);
  }

  /* password toggle */
  .eye-btn {
    position: absolute; right: 14px;
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.3);
    display: flex; align-items: center;
    transition: color .3s;
    padding: 0;
  }
  .eye-btn:hover { color: var(--blue-400); }
  .eye-btn svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; }

  /* ── ROW ── */
  .row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 26px;
    animation: fadeUp 0.6s ease 0.8s both;
  }
  .remember {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
  }
  .remember input[type=checkbox] {
    appearance: none; width: 17px; height: 17px;
    border: 1.5px solid rgba(59,130,246,0.4);
    border-radius: 4px; background: transparent;
    cursor: pointer; position: relative;
    transition: border-color .3s, background .3s;
  }
  .remember input[type=checkbox]:checked {
    background: var(--blue-500);
    border-color: var(--blue-400);
  }
  .remember input[type=checkbox]:checked::after {
    content: '';
    position: absolute; top: 2px; left: 5px;
    width: 5px; height: 9px;
    border: 2px solid #000;
    border-top: none; border-left: none;
    transform: rotate(45deg);
  }
  .remember span {
    font-size: 0.88rem; font-weight: 600;
    color: rgba(255,255,255,0.55); letter-spacing: .04em;
  }
  .forgot {
    font-size: 0.88rem; font-weight: 600;
    color: var(--blue-300);
    text-decoration: none; letter-spacing: .04em;
    transition: color .3s;
  }
  .forgot:hover { color: var(--blue-400); text-decoration: underline; }

  /* ── LOGIN BUTTON ── */
  .btn-login {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--blue-500), var(--blue-600));
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem; font-weight: 700;
    letter-spacing: .22em; text-transform: uppercase;
    border: none; border-radius: 12px; cursor: pointer;
    box-shadow: 0 0 24px rgba(26,95,212,0.45), 0 4px 16px rgba(0,0,0,0.4);
    transition: transform .2s, box-shadow .3s;
    margin-bottom: 22px;
    animation: fadeUp 0.6s ease 0.95s both;
    position: relative; overflow: hidden;
  }
  .btn-login::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0; transition: opacity .3s;
  }
  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 40px rgba(59,130,246,0.6), 0 8px 24px rgba(0,0,0,0.5);
  }
  .btn-login:hover::before { opacity: 1; }
  .btn-login:active { transform: translateY(0); }

  /* ── OR DIVIDER ── */
  .or-wrap {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px;
    animation: fadeUp 0.6s ease 1.05s both;
  }
  .or-wrap .line {
    flex: 1; height: 1px;
    background: rgba(255,255,255,0.1);
  }
  .or-wrap span {
    font-size: 0.78rem; font-weight: 700;
    color: rgba(255,255,255,0.3); letter-spacing: .15em;
  }

  /* ── SOCIAL BUTTONS ── */
  .socials {
    display: flex; gap: 12px;
    margin-bottom: 26px;
    animation: fadeUp 0.6s ease 1.15s both;
  }
  .btn-social {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 9px;
    padding: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 10px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.92rem; font-weight: 700;
    letter-spacing: .06em; color: rgba(255,255,255,0.75);
    transition: background .3s, border-color .3s, transform .2s, box-shadow .3s;
  }
  .btn-social:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.09);
  }
  .btn-social.google:hover  { border-color: var(--blue-400); box-shadow: 0 0 18px rgba(59,130,246,0.2); color:#fff; }
  .btn-social.facebook:hover { border-color: var(--blue-400); box-shadow: 0 0 18px rgba(59,130,246,0.2); color:#fff; }
  .btn-social svg { width:20px; height:20px; flex-shrink:0; }

  /* ── SIGNUP ── */
  .signup {
    text-align: center;
    font-size: 0.9rem; font-weight: 600;
    color: rgba(255,255,255,0.4); letter-spacing: .04em;
    animation: fadeUp 0.6s ease 1.3s both;
  }
  .signup a {
    color: var(--blue-300); text-decoration: none;
    transition: color .3s;
  }
  .signup a:hover { text-decoration: underline; }
</style>
</head>

<div class="card">
  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L3 7l9 5 9-5-9-5zM3 17l9 5 9-5M3 12l9 5 9-5"/></svg>
    </div>
    <p class="brand">SportIQ</p>
    <h1 class="title">WELCOME <span>BACK</span></h1>
  </div>
  <div class="divider"></div>

  <!-- Form -->
  <form id="loginForm" class="w-full">
    <div class="field">
      <label>Email / Username</label>
      <div class="field-inner">
        <input type="text" placeholder="Enter your email or username" id="email" required>
        <svg viewBox="0 0 24 24" style="position:absolute;left:14px;pointer-events:none"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2z"/><path d="M22 6l-10 7L2 6"/></svg>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="field-inner">
        <input type="password" placeholder="Enter your password" id="password" required>
        <svg viewBox="0 0 24 24" style="position:absolute;left:14px;pointer-events:none"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <button class="eye-btn" onclick="togglePw()" type="button" id="eyebtn">
          <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <!-- Remember + Forgot -->
    <div class="row">
      <label class="remember">
        <input type="checkbox" id="remember">
        <span>Remember Me</span>
      </label>
      <a href="#" class="forgot">Forgot Password?</a>
    </div>

    <!-- Login -->
    <button type="submit" class="btn-login">Login to SportIQ</button>
    
    <!-- Message container for JS error outputs -->
    <p id="loginMessage" style="text-align: center; margin-top: 10px; font-weight: 600;"></p>
  </form>

  <!-- OR -->
  <div class="or-wrap">
    <div class="line"></div><span>OR CONTINUE WITH</span><div class="line"></div>
  </div>

  <p class="signup">Don't have an account? <a href="signup.html">Sign Up Free</a></p>

<script>
  // Password toggle
  function togglePw() {
    const inp = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      inp.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  // Particles
  const container = document.getElementById('particles');
  const colors = ['#3B82F6', '#6EA8FE', '#ffffff', '#38BDF8'];
  for (let i = 0; i < 45; i++) {
    const p = document.createElement('div');
    p.className = 'p';
    const size = Math.random() * 5 + 2;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*8}s;box-shadow:0 0 ${size*2}px currentColor;`;
    container.appendChild(p);
  }
</script>
