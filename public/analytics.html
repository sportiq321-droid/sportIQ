<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics - SportIQ</title>

    <!-- Tailwind tokens + CDN -->
    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- CSS (existing) -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/admin-components.css" />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>

  <body class="font-display text-white min-h-screen bg-background-dark">
    <div class="relative flex min-h-screen w-full flex-col">
      <!-- Header -->
      <header
        class="sticky top-0 z-20 glassmorphic backdrop-blur-md border-b border-white/10"
      >
        <div class="flex items-center justify-between px-4 sm:px-6 py-4">
          <button
            id="backBtn"
            class="flex size-10 sm:size-11 items-center justify-center rounded-full text-white/80 hover:text-white hover:bg-white/10 transition-all active:scale-95"
            aria-label="Back"
            title="Back"
            type="button"
          >
            <span class="material-symbols-outlined">arrow_back</span>
          </button>
          <h1 class="text-xl sm:text-2xl lg:text-3xl font-bold tracking-tight">
            Analytics
          </h1>
          <a
            href="notifications.html"
            class="relative flex items-center justify-center size-10 sm:size-11 text-white/70 hover:text-white hover:bg-white/10 rounded-full transition"
            aria-label="Notifications"
            data-notify-bell
          >
            <span class="material-symbols-outlined">notifications</span>
          </a>
        </div>
      </header>

      <!-- Main Content -->
      <main
        class="flex-grow p-4 sm:p-6 lg:p-8 pb-28 sm:pb-32 mx-auto w-full max-w-4xl md:max-w-6xl lg:max-w-7xl xl:max-w-[1400px] 2xl:max-w-[1600px]"
      >
        <!-- Filters -->
        <section
          class="glassmorphic rounded-xl p-4 border border-white/10 mb-4"
        >
          <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
            <div id="stateFilterContainer">
              <label for="fState" class="block text-white/70 text-sm mb-1"
                >State</label
              >
              <select id="fState" class="w-full select-dark rounded-lg p-2">
                <option value="">All India</option>
              </select>
            </div>
            <div id="districtFilterContainer">
              <label for="fDistrict" class="block text-white/70 text-sm mb-1"
                >District</label
              >
              <select
                id="fDistrict"
                class="w-full select-dark rounded-lg p-2"
                disabled
                title="Select a state first"
              >
                <option value="">All Districts</option>
              </select>
            </div>
            <div id="sportFilterContainer">
              <label for="fSport" class="block text-white/70 text-sm mb-1"
                >Sport</label
              >
              <select
                id="fSport"
                class="w-full select-dark rounded-lg p-2"
              ></select>
            </div>
            <div>
              <label for="fSearch" class="block text-white/70 text-sm mb-1"
                >Search</label
              >
              <input
                id="fSearch"
                type="search"
                placeholder="Search by name/email..."
                class="w-full rounded-lg p-2 select-dark"
              />
            </div>
          </div>
          <div class="mt-3 flex flex-wrap gap-2 items-center">
            <button id="btnReset" class="btn-admin btn-admin-secondary">
              Reset Filters
            </button>
          </div>
        </section>

        <!-- Tab Navigation -->
        <div class="border-b border-white/10 mb-4">
          <div
            id="tabs"
            role="tablist"
            aria-label="Analytics Tabs"
            class="flex gap-4 -mb-px"
          >
            <!-- Tabs will be injected here by JS based on user role -->
          </div>
        </div>

        <!-- Tab Panels -->
        <div id="panels">
          <!-- Player Panel -->
          <div
            id="playersPanel"
            role="tabpanel"
            aria-labelledby="playersTab"
            class="hidden"
          >
            <div id="playersContent"></div>
          </div>
          <!-- Coaches Panel -->
          <div
            id="coachesPanel"
            role="tabpanel"
            aria-labelledby="coachesTab"
            class="hidden"
          >
            <div id="coachesContent"></div>
          </div>
          <!-- Achievements Panel -->
          <div
            id="achievementsPanel"
            role="tabpanel"
            aria-labelledby="achievementsTab"
            class="hidden"
          >
            <div id="achievementsContent"></div>
          </div>
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script src="js/districts.js"></script>
    <script type="module" src="js/notify-dot.js"></script>
    <script type="module" src="js/analytics.js"></script>
    <script type="module" src="js/nav.js"></script>
    <script>
      // Smart Back Button
      document
        .getElementById("backBtn")
        ?.addEventListener("click", function (e) {
          e.preventDefault();
          try {
            const last = JSON.parse(
              sessionStorage.getItem("lastSection") || "null"
            );
            if (last && last.href && !/analytics\.html/i.test(last.href)) {
              window.location.href = last.href;
              return;
            }
          } catch {}
          window.location.href = "dashboard.html";
        });
    </script>
  </body>
</html>
