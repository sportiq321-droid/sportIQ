<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportIQ — Tournaments</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Cinzel:wght@700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<script src="js/tailwind-config.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue-950: #020B18;
    --blue-900: #061527;
    --blue-800: #0A2040;
    --blue-700: #0D3060;
    --blue-600: #1146A0;
    --blue-500: #1A5FD4;
    --blue-400: #3B82F6;
    --blue-300: #6EA8FE;
    --blue-200: #A8CCFF;
    --white-pure: #FFFFFF;
    --white-ghost: #A8BBDA;
    --accent-sky: #38BDF8;
    --card: rgba(6,21,39,0.7);
    --border: rgba(59,130,246,0.18);
  }

  body {
    min-height: 100vh;
    font-family: 'Rajdhani', sans-serif;
    background: var(--blue-950);
    overflow-x: hidden;
    padding-bottom: 80px;
  }

  /* BG */
  .bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 40%, rgba(26,95,212,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 10%, rgba(56,189,248,0.08) 0%, transparent 50%),
      linear-gradient(135deg, #020B18 0%, #040F20 50%, #020B18 100%);
    z-index: 0;
  }
  .grid-bg {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .overlay {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.45) 100%);
    pointer-events: none; z-index: 0;
  }

  /* PARTICLES */
  .particles { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
  .p { position:absolute; border-radius:50%; animation:floatUp linear infinite; opacity:0; }
  @keyframes floatUp {
    0%   { transform:translateY(100vh) scale(0); opacity:0; }
    10%  { opacity:0.5; }
    90%  { opacity:0.2; }
    100% { transform:translateY(-10vh) scale(1.2); opacity:0; }
  }

  /* TOP NAV */
  .topnav {
    position: sticky; top: 0; z-index: 100;
    display: grid; grid-template-columns: 48px 1fr 48px;
    align-items: center;
    padding: 14px 20px;
    background: rgba(2,11,24,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(59,130,246,0.12);
    animation: fadeDown .5s ease both;
  }
  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .topnav-title {
    font-family: 'Oswald', sans-serif;
    font-size: 1.15rem; letter-spacing: .14em;
    color: var(--white-pure); text-align: center;
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--blue-400);
    background: linear-gradient(135deg, var(--blue-500), var(--blue-800));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Oswald', sans-serif; font-size: 1rem;
    color: #fff; font-weight: 700; cursor: pointer;
    box-shadow: 0 0 10px rgba(59,130,246,0.3);
    transition: transform .2s, box-shadow .3s;
  }
  .avatar:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(59,130,246,0.6); }
  .notif-btn {
    background: none; border: none; cursor: pointer;
    color: var(--white-ghost); transition: color .3s;
    display: flex; justify-content: flex-end;
  }
  .notif-btn:hover { color: var(--blue-400); }
  .notif-btn svg { width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; }
  .notif-wrap { position: relative; }
  .notif-dot {
    position: absolute; top: -1px; right: -1px;
    width: 8px; height: 8px; background: #ef4444;
    border-radius: 50%; border: 1.5px solid var(--blue-950);
  }

  /* TABS */
  .tabs {
    position: sticky; top: 57px; z-index: 99;
    display: flex;
    background: rgba(2,11,24,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(59,130,246,0.1);
    animation: fadeDown .5s ease .1s both;
  }
  .tab-btn {
    flex: 1; padding: 14px 16px;
    background: none; border: none; cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: .92rem; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--white-ghost);
    border-bottom: 2px solid transparent;
    transition: color .3s, border-color .3s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .tab-btn.active {
    color: var(--white-pure);
    border-bottom: 2px solid var(--blue-400);
  }
  .tab-btn:hover { color: var(--white-pure); }
  .tab-count {
    background: rgba(59,130,246,0.2);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 20px; padding: 1px 8px;
    font-size: .72rem; color: var(--blue-300);
  }
  .tab-btn.active .tab-count {
    background: var(--blue-500);
    border-color: var(--blue-500);
    color: #fff;
  }

  /* MAIN */
  .main {
    position: relative; z-index: 1;
    padding: 20px 16px;
    max-width: 700px; margin: 0 auto;
  }

  /* TAB PANELS */
  .tab-panel { display: none; animation: fadeUp .4s ease both; }
  .tab-panel.active { display: block; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* SEARCH & FILTER CARD */
  .filter-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(20px);
    overflow: hidden;
    margin-bottom: 16px;
    position: relative;
  }
  .filter-card::before {
    content: ''; position: absolute;
    top: 8px; left: 8px;
    width: 20px; height: 20px;
    border-top: 1.5px solid rgba(59,130,246,0.35);
    border-left: 1.5px solid rgba(59,130,246,0.35);
    border-radius: 3px 0 0 0;
    pointer-events: none;
  }
  .filter-card::after {
    content: ''; position: absolute;
    bottom: 8px; right: 8px;
    width: 20px; height: 20px;
    border-bottom: 1.5px solid rgba(59,130,246,0.35);
    border-right: 1.5px solid rgba(59,130,246,0.35);
    border-radius: 0 0 3px 0;
    pointer-events: none;
  }

  .filter-row {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid rgba(59,130,246,0.09);
  }
  .filter-row:last-child { border-bottom: none; }
  .filter-icon {
    width: 20px; height: 20px; flex-shrink: 0;
    stroke: var(--white-ghost); fill: none; stroke-width: 1.8;
  }
  .filter-input {
    flex: 1; background: none; border: none; outline: none;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; font-weight: 500;
    color: var(--white-pure);
    letter-spacing: .04em;
  }
  .filter-input::placeholder { color: var(--white-ghost); }
  .filter-select {
    flex: 1; background: none; border: none; outline: none;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; font-weight: 500;
    color: var(--white-ghost);
    letter-spacing: .04em;
    cursor: pointer;
    appearance: none; -webkit-appearance: none;
  }
  .filter-select option { background: #061527; color: #fff; }
  .filter-select:focus { color: var(--white-pure); }

  /* SEARCH BTN */
  .search-btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--blue-500), var(--blue-600));
    border: none; border-radius: 12px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; font-weight: 700;
    letter-spacing: .16em; color: #fff; text-transform: uppercase;
    box-shadow: 0 0 18px rgba(26,95,212,0.4);
    transition: transform .2s, box-shadow .3s;
    margin-bottom: 16px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .search-btn:hover { transform: translateY(-2px); box-shadow: 0 0 28px rgba(59,130,246,0.6); }
  .search-btn svg { width:18px; height:18px; stroke:#fff; fill:none; stroke-width:2; }

  /* RESULTS */
  .results-label {
    font-size: .75rem; font-weight: 700; letter-spacing: .2em;
    text-transform: uppercase; color: var(--blue-300);
    margin-bottom: 12px; display: none;
  }

  .tournament-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    backdrop-filter: blur(16px);
    padding: 16px 18px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: border-color .3s, transform .2s, box-shadow .3s;
    animation: fadeUp .4s ease both;
  }
  .tournament-card:hover {
    border-color: var(--blue-400);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(59,130,246,0.15);
  }
  .tc-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 8px;
  }
  .tc-name {
    font-family: 'Oswald', sans-serif;
    font-size: 1.05rem; letter-spacing: .06em; color: var(--white-pure);
    flex: 1; margin-right: 10px;
  }
  .tc-badge {
    flex-shrink: 0;
    padding: 3px 10px; border-radius: 20px;
    font-size: .7rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase;
  }
  .badge-open   { background: rgba(59,130,246,0.15); color: var(--blue-300); border: 1px solid rgba(59,130,246,0.3); }
  .badge-soon   { background: rgba(56,189,248,0.12); color: var(--accent-sky); border: 1px solid rgba(56,189,248,0.25); }
  .badge-closed { background: rgba(239,68,68,0.1);   color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

  .tc-meta {
    display: flex; flex-wrap: wrap; gap: 10px;
  }
  .tc-meta-item {
    display: flex; align-items: center; gap: 5px;
    font-size: .82rem; color: var(--white-ghost);
  }
  .tc-meta-item svg { width:13px; height:13px; stroke:var(--blue-300); fill:none; stroke-width:2; flex-shrink:0; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 60px 20px;
    animation: fadeUp .5s ease .2s both;
  }
  .empty-icon {
    width: 64px; height: 64px; margin: 0 auto 16px;
    border: 1.5px solid rgba(59,130,246,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(59,130,246,0.06);
  }
  .empty-icon svg { width:28px; height:28px; stroke:var(--blue-300); fill:none; stroke-width:1.5; }
  .empty-title {
    font-family: 'Oswald', sans-serif;
    font-size: 1.1rem; letter-spacing: .1em; color: var(--white-pure);
    margin-bottom: 6px;
  }
  .empty-sub {
    font-size: .88rem; color: var(--white-ghost); line-height: 1.5;
  }

  /* BOTTOM NAV */
  .bottomnav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(2,11,24,0.92);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(59,130,246,0.12);
    display: flex; align-items: center;
    padding: 8px 0 10px;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 4px; cursor: pointer;
    padding: 4px 0;
    color: var(--white-ghost);
    transition: color .3s; border: none; background: none;
    font-family: 'Rajdhani', sans-serif;
    text-decoration: none;
  }
  .nav-item svg { width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.8; }
  .nav-item span { font-size:.7rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
  .nav-item.active { color: var(--blue-400); }
  .nav-item.active svg { filter: drop-shadow(0 0 6px rgba(59,130,246,0.7)); }
  .nav-item:hover { color: var(--blue-300); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--blue-700); color: #fff;
    padding: 10px 22px; border-radius: 30px;
    font-family: 'Rajdhani', sans-serif; font-size: .92rem; font-weight: 700;
    letter-spacing: .1em; opacity: 0; transition: all .35s ease;
    z-index: 200; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid-bg"></div>
<div class="overlay"></div>
<div class="particles" id="particles"></div>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="avatar" id="avatarBtn">P</div>
  <div class="topnav-title">Tournaments</div>
  <button class="notif-btn">
    <div class="notif-wrap">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span class="notif-dot"></span>
    </div>
  </button>
</nav>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('find', this)">Find Tournaments</button>
  <button class="tab-btn" onclick="switchTab('my', this)">
    My Tournaments
    <span class="tab-count" id="myCount">0</span>
  </button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- ── FIND TOURNAMENTS TAB ── -->
  <div class="tab-panel active" id="tab-find">

    <!-- Filters -->
    <div class="filter-card">
      <div class="filter-row">
        <svg class="filter-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="filter-input" id="searchInput" placeholder="Search by name or location" autocomplete="off">
      </div>
      <div class="filter-row">
        <svg class="filter-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
        <select class="filter-select" id="stateSelect" onchange="loadDistricts()">
          <option value="">Select State</option>
          <option>Tamil Nadu</option>
          <option>Maharashtra</option>
          <option>Karnataka</option>
          <option>Kerala</option>
          <option>Andhra Pradesh</option>
          <option>Telangana</option>
          <option>Delhi</option>
          <option>Gujarat</option>
          <option>Rajasthan</option>
          <option>Punjab</option>
          <option>West Bengal</option>
          <option>Uttar Pradesh</option>
        </select>
      </div>
      <div class="filter-row">
        <svg class="filter-icon" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <select class="filter-select" id="districtSelect">
          <option value="">Select District</option>
        </select>
      </div>
    </div>

    <!-- Search Button -->
    <button class="search-btn" onclick="searchTournaments()">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search Tournaments
    </button>

    <!-- Results -->
    <div class="results-label" id="resultsLabel">Results</div>
    <div id="resultsContainer"></div>

    <!-- Default empty -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 000 5H6"/><path d="M18 9h1.5a2.5 2.5 0 010 5H18"/><path d="M8 9h8"/><path d="M8 15h8"/><path d="M9 6l3-3 3 3"/><path d="M9 18l3 3 3-3"/></svg>
      </div>
      <div class="empty-title">Find Your Next Tournament</div>
      <div class="empty-sub">Search by name, location, or<br>filter by State & District to find tournaments near you.</div>
    </div>

  </div>

  <!-- ── MY TOURNAMENTS TAB ── -->
  <div class="tab-panel" id="tab-my">
    <div class="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
      </div>
      <div class="empty-title">No Tournaments Yet</div>
      <div class="empty-sub">You haven't registered for any tournaments.<br>Go find one and register!</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── Particles ──
  const container = document.getElementById('particles');
  const colors = ['#3B82F6','#6EA8FE','#38BDF8','#ffffff'];
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'p';
    const size = Math.random() * 3.5 + 1.5;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${9+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
    container.appendChild(p);
  }

  // ── Districts data ──
  const districts = {
    'Tamil Nadu': ['Chennai','Coimbatore','Madurai','Tiruchirappalli','Salem','Tirunelveli','Erode','Vellore','Thoothukudi','Dindigul','Thanjavur','Kancheepuram'],
    'Maharashtra': ['Mumbai','Pune','Nagpur','Nashik','Aurangabad','Solapur','Thane','Kolhapur'],
    'Karnataka': ['Bengaluru','Mysuru','Mangaluru','Hubballi','Belagavi','Tumkur','Davangere'],
    'Kerala': ['Thiruvananthapuram','Kochi','Kozhikode','Thrissur','Kannur','Kollam','Palakkad'],
    'Andhra Pradesh': ['Visakhapatnam','Vijayawada','Guntur','Tirupati','Kurnool','Nellore'],
    'Telangana': ['Hyderabad','Warangal','Karimnagar','Nizamabad','Khammam'],
    'Delhi': ['New Delhi','North Delhi','South Delhi','East Delhi','West Delhi'],
    'Gujarat': ['Ahmedabad','Surat','Vadodara','Rajkot','Bhavnagar','Jamnagar'],
    'Rajasthan': ['Jaipur','Jodhpur','Udaipur','Kota','Ajmer','Bikaner'],
    'Punjab': ['Ludhiana','Amritsar','Jalandhar','Patiala','Bathinda'],
    'West Bengal': ['Kolkata','Howrah','Asansol','Durgapur','Siliguri'],
    'Uttar Pradesh': ['Lucknow','Kanpur','Agra','Varanasi','Allahabad','Meerut'],
  };

  function loadDistricts() {
    const state = document.getElementById('stateSelect').value;
    const sel = document.getElementById('districtSelect');
    sel.innerHTML = '<option value="">Select District</option>';
    if (districts[state]) {
      districts[state].forEach(d => {
        const o = document.createElement('option');
        o.value = d; o.textContent = d;
        sel.appendChild(o);
      });
    }
  }

  // ── Dummy tournament data ──
  const dummyTournaments = [
    { name:'Tamil Nadu State Cricket Championship', sport:'Cricket', location:'Chennai, TN', date:'Apr 12–18, 2026', slots:'64 Teams', status:'open' },
    { name:'Coimbatore District Football Cup', sport:'Football', location:'Coimbatore, TN', date:'Apr 20–22, 2026', slots:'32 Teams', status:'open' },
    { name:'South India Badminton Open', sport:'Badminton', location:'Madurai, TN', date:'May 3–5, 2026', slots:'128 Players', status:'soon' },
    { name:'Chennai Athletics Meet 2026', sport:'Athletics', location:'Chennai, TN', date:'May 10, 2026', slots:'200 Athletes', status:'open' },
    { name:'State Basketball League', sport:'Basketball', location:'Salem, TN', date:'Mar 30–Apr 2, 2026', slots:'16 Teams', status:'closed' },
  ];

  function searchTournaments() {
    const query  = document.getElementById('searchInput').value.trim().toLowerCase();
    const state  = document.getElementById('stateSelect').value;
    const dist   = document.getElementById('districtSelect').value;

    document.getElementById('emptyState').style.display = 'none';

    let results = dummyTournaments;

    if (query) results = results.filter(t =>
      t.name.toLowerCase().includes(query) ||
      t.location.toLowerCase().includes(query) ||
      t.sport.toLowerCase().includes(query)
    );
    if (dist)  results = results.filter(t => t.location.includes(dist));
    else if (state) results = results.filter(t => t.location.includes(state.split(' ')[0]));

    const container = document.getElementById('resultsContainer');
    const label     = document.getElementById('resultsLabel');

    container.innerHTML = '';

    if (results.length === 0) {
      label.style.display = 'none';
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <div class="empty-title">No Tournaments Found</div>
          <div class="empty-sub">Try a different search term or location.</div>
        </div>`;
      return;
    }

    label.textContent = `${results.length} Tournament${results.length>1?'s':''} Found`;
    label.style.display = 'block';

    results.forEach((t, i) => {
      const card = document.createElement('div');
      card.className = 'tournament-card';
      card.style.animationDelay = `${i * 0.08}s`;
      card.innerHTML = `
        <div class="tc-header">
          <div class="tc-name">${t.name}</div>
          <span class="tc-badge badge-${t.status}">${t.status === 'open' ? 'Open' : t.status === 'soon' ? 'Coming Soon' : 'Closed'}</span>
        </div>
        <div class="tc-meta">
          <span class="tc-meta-item">
            <svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 000 5H6"/><path d="M18 9h1.5a2.5 2.5 0 010 5H18"/><path d="M8 9h8"/><path d="M8 15h8"/></svg>
            ${t.sport}
          </span>
          <span class="tc-meta-item">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${t.location}
          </span>
          <span class="tc-meta-item">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${t.date}
          </span>
          <span class="tc-meta-item">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            ${t.slots}
          </span>
        </div>
      `;
      card.onclick = () => showToast(`📋 ${t.name} — Details coming soon!`);
      container.appendChild(card);
    });
  }

  // ── Tab switch ──
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Enter key search ──
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchTournaments();
  });
</script>
<script type="module" src="js/nav.js"></script>
</body>
</html>
