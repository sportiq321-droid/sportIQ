<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Upload Certificate - SportIQ</title>

    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css" />

    <style>
      :root {
        --blue-950: #020B18;
        --blue-900: #061527;
        --blue-800: #0A2040;
        --blue-700: #0D3060;
        --blue-600: #1146A0;
        --blue-500: #1A5FD4;
        --blue-400: #3B82F6;
        --blue-300: #6EA8FE;
        --blue-200: #A8CCFF;
        --white-pure: #FFFFFF;
        --white-warm: #F8FAFF;
        --white-ghost: #A8BBDA;
        --accent-sky: #38BDF8;
        --accent-cyan: #06B6D4;
        --card-bg: rgba(6,21,39,0.78);
        --border: rgba(59,130,246,0.20);
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: 'Rajdhani', sans-serif;
        background: var(--blue-950);
        color: var(--white-pure);
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background:
          radial-gradient(ellipse at 20% 20%, rgba(26,95,212,0.18) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 80%, rgba(56,189,248,0.07) 0%, transparent 50%),
          linear-gradient(135deg, #020B18 0%, #040F20 100%);
      }
      body::after {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image:
          linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
      .p { position: absolute; border-radius: 50%; animation: floatUp linear infinite; opacity: 0; }
      @keyframes floatUp {
        0%   { transform: translateY(100vh) scale(0); opacity: 0; }
        10%  { opacity: 0.4; }
        90%  { opacity: 0.15; }
        100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
      }

      .page-wrap {
        position: relative; z-index: 1;
        min-height: 100vh; display: flex; flex-direction: column;
      }

      /* Header */
      header {
        position: sticky; top: 0; z-index: 10;
        background: rgba(2,11,24,0.92);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(59,130,246,0.14);
        padding: 12px 16px;
        animation: fadeDown .5s ease both;
      }
      @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .header-inner {
        max-width: 576px; margin: 0 auto;
        display: flex; align-items: center; justify-content: space-between;
      }
      header h1 {
        font-family: 'Oswald', sans-serif;
        font-size: 1.1rem; font-weight: 700;
        letter-spacing: .16em; text-transform: uppercase;
        color: var(--white-pure);
      }
      .header-spacer { width: 38px; }

      .header-btn {
        width: 38px; height: 38px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: var(--white-ghost);
        background: rgba(59,130,246,0.08);
        border: 1px solid rgba(59,130,246,0.15);
        transition: all .3s; cursor: pointer;
        padding: 0;
      }
      .header-btn:hover { color: var(--white-pure); background: rgba(59,130,246,0.16); border-color: var(--blue-400); }
      .header-btn:active { transform: scale(.95); }

      /* Main */
      main {
        flex: 1; padding: 24px 16px 48px;
        animation: fadeUp .5s ease .1s both;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Card */
      .siq-card {
        max-width: 576px; margin: 0 auto;
        background: rgba(6,21,39,0.78);
        border: 1px solid rgba(59,130,246,0.20);
        border-radius: 14px;
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        position: relative; overflow: hidden;
        padding: 28px 24px;
        box-shadow: 0 16px 48px rgba(0,0,0,0.3);
      }
      .siq-card::before {
        content: ''; position: absolute;
        top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, var(--blue-500), var(--accent-sky));
      }

      /* Description text */
      .card-desc {
        color: var(--white-ghost);
        font-size: .95rem; font-weight: 500; line-height: 1.55;
      }

      /* File input section */
      .file-section { margin-top: 20px; }

      /* Custom file input wrapper */
      .file-input-wrap {
        position: relative;
        display: flex; align-items: stretch;
        background: rgba(59,130,246,0.07);
        border: 1px solid rgba(59,130,246,0.22);
        border-radius: 10px;
        overflow: hidden;
        transition: border-color .2s, box-shadow .2s;
      }
      .file-input-wrap:focus-within {
        border-color: var(--blue-400);
        box-shadow: 0 0 0 3px rgba(59,130,246,0.10);
      }

      .file-label-btn {
        display: flex; align-items: center; gap: 6px;
        padding: 0 16px;
        background: linear-gradient(135deg, #1A5FD4, #1146A0);
        color: #fff;
        font-family: 'Rajdhani', sans-serif; font-weight: 700;
        font-size: .82rem; letter-spacing: .10em; text-transform: uppercase;
        white-space: nowrap; cursor: pointer; flex-shrink: 0;
        min-height: 44px;
        transition: box-shadow .2s;
      }
      .file-label-btn:hover { box-shadow: 0 0 16px rgba(59,130,246,0.4); }

      #certFile {
        position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
      }

      .file-name-display {
        flex: 1; padding: 0 14px;
        color: var(--white-ghost);
        font-size: .88rem; font-weight: 500;
        display: flex; align-items: center;
        min-width: 0;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }

      #fileInfo {
        margin-top: 8px;
        font-size: .8rem; font-weight: 600;
        color: var(--blue-300); letter-spacing: .03em;
      }

      #fileError {
        margin-top: 8px;
        font-size: .8rem; font-weight: 600;
        color: #f87171; letter-spacing: .03em;
      }

      /* Verify button */
      .btn-verify {
        display: flex; align-items: center; justify-content: center;
        width: 100%; height: 48px;
        margin-top: 24px;
        background: linear-gradient(135deg, #1A5FD4, #1146A0);
        border: none; border-radius: 10px;
        color: #fff;
        font-family: 'Rajdhani', sans-serif; font-weight: 700;
        font-size: 1rem; letter-spacing: .10em; text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 0 14px rgba(26,95,212,0.4);
        transition: box-shadow .25s, transform .2s;
      }
      .btn-verify:hover { box-shadow: 0 0 22px rgba(59,130,246,0.55); transform: translateY(-1px); }
      .btn-verify:active { transform: scale(.99); }

      /* Success message */
      #fileSuccess {
        margin-top: 12px;
        font-size: .85rem; font-weight: 600;
        color: #34D399; letter-spacing: .03em;
      }
      #fileSuccess.hidden { display: none !important; }
    </style>
  </head>

  <body>
    <div class="particles" id="particles"></div>

    <div class="page-wrap">

      <!-- HEADER -->
      <header>
        <div class="header-inner">
          <button onclick="history.back()" class="header-btn" aria-label="Back">
            <span class="material-symbols-outlined" style="font-size:20px;">arrow_back_ios_new</span>
          </button>
          <h1>Upload Certificate</h1>
          <div class="header-spacer" aria-hidden="true"></div>
        </div>
      </header>

      <!-- MAIN -->
      <main>
        <div class="siq-card">
          <p class="card-desc">Please upload a PDF or DOC/DOCX file as your certificate. Max size: 5 MB.</p>

          <div class="file-section">
            <div class="file-input-wrap">
              <div class="file-label-btn">
                <span class="material-symbols-outlined" style="font-size:16px;">upload_file</span>
                <span>Choose File</span>
              </div>
              <span class="file-name-display" id="fileNameDisplay">No file chosen</span>
              <input
                id="certFile"
                type="file"
                accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
              />
            </div>
            <p id="fileInfo"></p>
            <p id="fileError" aria-live="assertive"></p>
          </div>

          <button id="verifyBtn" class="btn-verify">Verify</button>

          <p id="fileSuccess" class="hidden" aria-live="polite" role="status"></p>
        </div>
      </main>
    </div>

    <!-- Update file name display -->
    <script>
      document.getElementById('certFile')?.addEventListener('change', function () {
        const display = document.getElementById('fileNameDisplay');
        if (display) {
          display.textContent = this.files?.[0]?.name || 'No file chosen';
        }
      });
    </script>

    <!-- Particles -->
    <script>
      const pc = document.getElementById('particles');
      const cols = ['#3B82F6','#6EA8FE','#38BDF8','#ffffff'];
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'p';
        const s = Math.random() * 3 + 1.5;
        p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${9+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
        pc.appendChild(p);
      }
    </script>

    <script type="module" src="js/upload-certificate.js"></script>
  </body>
</html>
