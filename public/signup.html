<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Register - SportIQ</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

    <!-- Tailwind config BEFORE CDN -->
    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <!-- Global CSS -->
    <link rel="stylesheet" href="css/global.css" />

    <style>
      :root {
        --blue-950: #020B18;
        --blue-900: #061527;
        --blue-800: #0A2040;
        --blue-700: #0D3060;
        --blue-600: #1146A0;
        --blue-500: #1A5FD4;
        --blue-400: #3B82F6;
        --blue-300: #6EA8FE;
        --blue-200: #A8CCFF;
        --white-pure: #FFFFFF;
        --white-warm: #F8FAFF;
        --white-ghost: #A8BBDA;
        --accent-sky: #38BDF8;
        --accent-cyan: #06B6D4;
        --card-bg: rgba(6,21,39,0.78);
        --border: rgba(59,130,246,0.20);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Rajdhani', sans-serif;
        background: var(--blue-950);
        color: var(--white-pure);
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }

      /* Background */
      body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background:
          radial-gradient(ellipse at 20% 20%, rgba(26,95,212,0.18) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 80%, rgba(56,189,248,0.07) 0%, transparent 50%),
          linear-gradient(135deg, #020B18 0%, #040F20 100%);
      }

      body::after {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image:
          linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* Particles */
      .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
      .p { position: absolute; border-radius: 50%; animation: floatUp linear infinite; opacity: 0; }
      @keyframes floatUp {
        0%   { transform: translateY(100vh) scale(0); opacity: 0; }
        10%  { opacity: 0.4; }
        90%  { opacity: 0.15; }
        100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
      }

      /* Layout */
      .page-grid {
        position: relative; z-index: 1;
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      @media (min-width: 1024px) {
        .page-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; }
      }

      /* Header */
      header {
        position: sticky; top: 0; z-index: 20;
        grid-column: 1 / -1;
        background: rgba(2,11,24,0.92);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(59,130,246,0.14);
        padding: 12px 16px;
        animation: fadeDown .5s ease both;
      }
      @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .header-inner {
        max-width: 1280px; margin: 0 auto;
        display: flex; align-items: center; justify-content: space-between;
      }
      .header-spacer { width: 40px; }
      header h1 {
        font-family: 'Oswald', sans-serif;
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: .16em;
        color: var(--white-pure);
        text-transform: uppercase;
      }

      /* Aside */
      aside {
        display: none;
        position: relative;
        overflow: hidden;
      }
      @media (min-width: 1024px) { aside { display: block; } }

      .aside-img {
        position: absolute; inset: 0;
        background-image: url('https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=1600&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
      }
      .aside-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(to top, rgba(2,11,24,0.85) 0%, rgba(2,11,24,0.45) 50%, transparent 100%);
      }
      .aside-content {
        position: relative; height: 100%;
        display: flex; align-items: flex-end;
      }
      .aside-inner { padding: 40px; }
      .aside-inner img { height: 56px; width: auto; margin-bottom: 16px; }
      .aside-inner h2 {
        font-family: 'Oswald', sans-serif;
        font-size: 1.6rem; font-weight: 700;
        color: var(--white-pure);
        letter-spacing: .05em;
        margin-bottom: 8px;
      }
      .aside-inner p {
        color: var(--white-ghost);
        font-size: 1rem; font-weight: 500;
        line-height: 1.5;
      }

      /* Main */
      main {
        display: flex; align-items: center; justify-content: center;
        padding: 24px 16px;
        animation: fadeUp .5s ease .1s both;
      }
      @media (min-width: 1024px) { main { padding: 32px; } }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Card */
      .siq-card {
        background: rgba(6,21,39,0.78);
        border: 1px solid rgba(59,130,246,0.20);
        border-radius: 14px;
        backdrop-filter: blur(16px);
        position: relative; overflow: hidden;
        width: 100%; max-width: 448px;
        padding: 32px;
        box-shadow: 0 24px 64px rgba(0,0,0,0.4);
      }
      .siq-card::before {
        content: ''; position: absolute;
        top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, var(--blue-500), var(--accent-sky));
      }

      /* Logo area */
      .card-header { text-align: center; margin-bottom: 28px; }
      .card-header img { height: 64px; width: auto; margin: 0 auto 12px; display: block; }
      .card-header p {
        color: var(--white-ghost);
        font-size: 1rem; font-weight: 500;
        letter-spacing: .03em;
      }

      /* Form */
      .form-group { margin-bottom: 16px; }
      .input-wrap { position: relative; }
      .input-wrap > .material-icons {
        position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
        color: var(--white-ghost); font-size: 20px; pointer-events: none;
      }

      .form-input {
        width: 100%;
        padding: 11px 12px 11px 42px;
        background: rgba(59,130,246,0.07);
        border: 1px solid rgba(59,130,246,0.22);
        border-radius: 10px;
        color: var(--white-pure);
        font-family: 'Rajdhani', sans-serif;
        font-size: .95rem;
        font-weight: 500;
        outline: none;
        transition: border-color .2s, box-shadow .2s;
      }
      .form-input::placeholder { color: var(--white-ghost); opacity: 0.7; }
      .form-input:focus {
        border-color: var(--blue-400);
        box-shadow: 0 0 0 3px rgba(59,130,246,0.10);
      }

      .field-error {
        font-size: .78rem; font-weight: 600;
        color: #f87171;
        margin-top: 5px;
        min-height: 18px;
        letter-spacing: .04em;
      }

      /* Button */
      .btn-primary {
        display: flex; align-items: center; justify-content: center;
        width: 100%;
        padding: 13px 24px;
        background: linear-gradient(135deg, #1A5FD4, #1146A0);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-family: 'Rajdhani', sans-serif;
        font-size: 1rem; font-weight: 700;
        letter-spacing: .10em;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 0 14px rgba(26,95,212,0.4);
        transition: box-shadow .25s, transform .2s;
        margin-top: 8px;
      }
      .btn-primary:hover {
        box-shadow: 0 0 22px rgba(59,130,246,0.55);
        transform: translateY(-1px);
      }
      .btn-primary:active { transform: scale(0.99); }

      /* Message */
      #msg {
        margin-top: 16px;
        font-size: .875rem; font-weight: 600;
        min-height: 20px;
        text-align: center;
        letter-spacing: .03em;
      }

      /* Footer link */
      .card-footer {
        text-align: center; margin-top: 24px;
        color: var(--white-ghost);
        font-size: .92rem; font-weight: 500;
      }
      .card-footer a {
        color: var(--blue-300);
        font-weight: 700;
        text-decoration: none;
        transition: color .2s;
      }
      .card-footer a:hover { color: var(--white-pure); text-decoration: underline; }
    </style>
  </head>

  <body data-page="register">
    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <div class="page-grid">
      <!-- Header -->
      <header>
        <div class="header-inner">
          <div class="header-spacer"></div>
          <h1>Register</h1>
          <div class="header-spacer"></div>
        </div>
      </header>

      <!-- Left visual panel -->
      <aside>
        <div class="aside-img" aria-hidden="true"></div>
        <div class="aside-overlay"></div>
        <div class="aside-content">
          <div class="aside-inner">
            <img src="SportIQ blue logo.png" alt="SportIQ logo" />
            <h2>Elevate your game</h2>
            <p>Manage players, sessions, and tournaments—all in one place.</p>
          </div>
        </div>
      </aside>

      <!-- Right form panel -->
      <main>
        <div class="siq-card">
          <div class="card-header">
            <img src="SportIQ blue logo.png" alt="SportIQ logo" />
            <p>Create your Account</p>
          </div>

          <form id="registerForm">
            <div class="form-group">
              <label for="regUsername" class="sr-only">Username</label>
              <div class="input-wrap">
                <span class="material-icons">person</span>
                <input type="text" id="regUsername" class="form-input" placeholder="Username" required />
              </div>
              <p class="field-error" id="regUsernameError" aria-live="polite"></p>
            </div>

            <div class="form-group">
              <label for="regEmail" class="sr-only">Email</label>
              <div class="input-wrap">
                <span class="material-icons">email</span>
                <input type="email" id="regEmail" class="form-input" placeholder="Email address" required />
              </div>
              <p class="field-error" id="regEmailError" aria-live="polite"></p>
            </div>

            <div class="form-group">
              <label for="regPass" class="sr-only">Password</label>
              <div class="input-wrap">
                <span class="material-icons">lock</span>
                <input type="password" id="regPass" class="form-input" placeholder="Password" required minlength="6" />
                <button type="button" id="toggleRegPass" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--white-ghost); padding: 0;">
                  <span class="material-icons" style="font-size: 20px;">visibility_off</span>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label for="regPass2" class="sr-only">Confirm Password</label>
              <div class="input-wrap">
                <span class="material-icons">lock_reset</span>
                <input type="password" id="regPass2" class="form-input" placeholder="Confirm Password" required />
                <button type="button" id="toggleRegPass2" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--white-ghost); padding: 0;">
                  <span class="material-icons" style="font-size: 20px;">visibility_off</span>
                </button>
              </div>
              <p class="field-error" id="regPass2Error" aria-live="polite"></p>
            </div>

            <button type="submit" class="btn-primary">Create Account</button>
          </form>

          <p id="msg" aria-live="polite"></p>

          <div class="card-footer">
            Already have an account?
            <a href="login.html">Log In</a>
          </div>
        </div>
      </main>
    </div>

    <!-- Particles script -->
    <script>
      const pc = document.getElementById('particles');
      const cols = ['#3B82F6','#6EA8FE','#38BDF8','#ffffff'];
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'p';
        const s = Math.random() * 3 + 1.5;
        p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${9+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
        pc.appendChild(p);
      }
    </script>

    <script type="module" src="js/auth-pages.js"></script>
  </body>
</html>
