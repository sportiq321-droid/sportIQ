<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Assessments - SportIQ</title>

    <!-- Tailwind (project-wide tokens) -->
    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link rel="stylesheet" href="css/global.css" />
  </head>
  <body data-page="assessments-list" class="font-display text-white">
    <!-- Header -->
    <header class="sticky top-0 z-20 glassmorphic px-4 py-3">
      <div class="max-w-xl mx-auto flex items-center justify-between">
        <div class="w-10"></div>
        <h1 class="text-lg font-bold">My Assessments</h1>
        <div class="w-10"></div>
      </div>
    </header>

    <main class="max-w-xl mx-auto px-4 pt-4 pb-28">
      <!-- Filters -->
      <section class="mb-4 grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-white/60 mb-1">Drill</label>
          <select
            id="drillFilter"
            class="select-dark w-full rounded-lg bg-white/10 border border-white/10 text-white focus:ring-0"
            aria-label="Filter by drill"
          >
            <option value="ALL">All</option>
            <option value="SIT_UPS">Sit-ups</option>
            <option value="RUN_800M">Run 800m</option>
            <option value="RUN_1_6K">Run 1.6km</option>
            <option value="BROAD_JUMP">Broad Jump</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-white/60 mb-1">Timeframe</label>
          <select
            id="timeFilter"
            class="select-dark w-full rounded-lg bg-white/10 border border-white/10 text-white focus:ring-0"
            aria-label="Filter by timeframe"
          >
            <option value="ALL">All time</option>
            <option value="7">Last 7 days</option>
            <option value="30">Last 30 days</option>
          </select>
        </div>
      </section>

      <!-- List -->
      <section id="listSection">
        <!-- Loading skeleton -->
        <div id="loading" class="space-y-3">
          <div
            class="glassmorphic rounded-2xl p-5 border border-white/10 animate-pulse"
          >
            <div class="h-4 bg-white/10 rounded w-1/3 mb-3"></div>
            <div class="h-3 bg-white/10 rounded w-2/3 mb-2"></div>
            <div class="h-3 bg-white/10 rounded w-1/2"></div>
          </div>
          <div
            class="glassmorphic rounded-2xl p-5 border border-white/10 animate-pulse"
          >
            <div class="h-4 bg-white/10 rounded w-1/3 mb-3"></div>
            <div class="h-3 bg-white/10 rounded w-2/3 mb-2"></div>
            <div class="h-3 bg-white/10 rounded w-1/2"></div>
          </div>
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="hidden text-center text-white/60">
          No assessments yet.
        </div>

        <!-- List container -->
        <div id="assessList" class="space-y-3"></div>
      </section>
    </main>

    <!-- Controller -->
    <script type="module" src="js/assessments/my.js"></script>

    <!-- Shared bottom nav (Player) -->
    <script type="module" src="js/nav.js"></script>
  </body>
</html>
