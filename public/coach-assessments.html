<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assessments Review - SportIQ</title>

    <!-- Existing scripts — untouched -->
    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --blue-950: #020B18;
        --blue-900: #061527;
        --blue-600: #1146A0;
        --blue-500: #1A5FD4;
        --blue-400: #3B82F6;
        --blue-300: #6EA8FE;
        --white-pure: #FFFFFF;
        --white-ghost: #A8BBDA;
        --accent-sky: #38BDF8;
        --card-bg: rgba(6,21,39,0.75);
        --border: rgba(59,130,246,0.20);
      }

      html, body {
        min-height: 100vh;
        background: var(--blue-950);
        color: var(--white-pure);
        font-family: 'Rajdhani', sans-serif;
        overflow-x: hidden;
      }

      /* ── BG ── */
      body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0;
        background:
          radial-gradient(ellipse at 20% 20%, rgba(26,95,212,0.18) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 80%, rgba(56,189,248,0.07) 0%, transparent 50%),
          linear-gradient(135deg, #020B18 0%, #040F20 100%);
        pointer-events: none;
      }
      body::after {
        content: '';
        position: fixed; inset: 0; z-index: 0;
        background-image:
          linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }

      /* ── PARTICLES ── */
      .particles { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
      .p { position:absolute; border-radius:50%; animation:floatUp linear infinite; opacity:0; }
      @keyframes floatUp {
        0%   { transform:translateY(100vh) scale(0); opacity:0; }
        10%  { opacity:0.4; }
        90%  { opacity:0.15; }
        100% { transform:translateY(-10vh) scale(1.2); opacity:0; }
      }

      /* ── PAGE WRAP ── */
      .page-wrap {
        position: relative; z-index: 1;
        display: flex; flex-direction: column;
        min-height: 100vh;
        animation: fadeUp .5s ease both;
      }
      @keyframes fadeUp {
        from { opacity:0; transform:translateY(18px); }
        to   { opacity:1; transform:translateY(0); }
      }

      /* ── MAIN ── */
      main {
        flex: 1;
        max-width: 900px; margin: 0 auto; width: 100%;
        padding: 0 16px 110px;
        display: flex; flex-direction: column; gap: 20px;
      }

      /* ── HEADER ── */
      header {
        display: flex; align-items: center; justify-content: space-between;
        gap: 12px; padding: 18px 0 4px;
        animation: fadeDown .5s ease both;
      }
      @keyframes fadeDown {
        from { opacity:0; transform:translateY(-14px); }
        to   { opacity:1; transform:translateY(0); }
      }
      .header-btn {
        width: 40px; height: 40px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: var(--white-ghost); background: rgba(59,130,246,0.08);
        border: 1px solid rgba(59,130,246,0.15);
        cursor: pointer; transition: all .3s;
        text-decoration: none; outline: none; flex-shrink: 0;
      }
      .header-btn:hover {
        color: var(--white-pure);
        background: rgba(59,130,246,0.16);
        border-color: var(--blue-400);
      }
      .header-btn .material-symbols-outlined { font-size: 20px; }
      header h1 {
        font-family: 'Oswald', sans-serif;
        font-size: clamp(1rem, 3vw, 1.3rem);
        letter-spacing: .14em; color: var(--white-pure);
        flex: 1; text-align: center;
      }
      .notif-wrap { position: relative; }
      .notif-dot {
        position: absolute; top: 1px; right: 1px;
        width: 8px; height: 8px; background: #ef4444;
        border-radius: 50%; border: 1.5px solid var(--blue-950);
      }

      /* ── SECTION HEADING ── */
      #pendingHeader {
        font-family: 'Oswald', sans-serif;
        font-size: .95rem; letter-spacing: .14em; text-transform: uppercase;
        color: var(--white-ghost);
      }
      #pendingHeader span { color: var(--blue-300); }

      /* ── LOADING SKELETON ── */
      #loadingState .skeleton-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px; padding: 16px;
        display: flex; align-items: center; gap: 14px;
        animation: shimmer 1.4s ease infinite;
      }
      @keyframes shimmer {
        0%,100% { opacity:.5 }
        50% { opacity:.9 }
      }
      .skel-avatar {
        width: 52px; height: 52px; border-radius: 50%;
        background: rgba(59,130,246,0.1); flex-shrink: 0;
      }
      .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
      .skel-line {
        height: 10px; border-radius: 6px;
        background: rgba(59,130,246,0.1);
      }

      /* ── EMPTY STATE ── */
      #emptyState {
        text-align: center; padding: 60px 16px;
      }
      #emptyState p {
        font-size: .9rem; font-weight: 600;
        color: var(--white-ghost); letter-spacing: .06em;
      }

      /* ── CARDS CONTAINER (injected by coach.js) ── */
      /* Style assessment cards injected by JS */
      #cardsContainer > * {
        background: var(--card-bg) !important;
        border: 1px solid var(--border) !important;
        border-radius: 16px !important;
        padding: 16px !important;
        transition: border-color .3s, box-shadow .3s !important;
      }
      #cardsContainer > *:hover {
        border-color: rgba(59,130,246,0.38) !important;
        box-shadow: 0 6px 24px rgba(0,0,0,0.3) !important;
      }

      /* glow helper */
      .glow {
        box-shadow: 0 0 5px rgba(59,130,246,0.45),
                    0 0 12px rgba(59,130,246,0.25),
                    0 0 20px rgba(59,130,246,0.15);
      }

      /* ── MODAL ── */
      /* modal-open: hide nav */
      .modal-open footer,
      .modal-open .nav-shell,
      .modal-open [data-nav-shell],
      .modal-open nav { display: none !important; }
      .modal-open .fixed { z-index: 9999 !important; }

      #assessModal {
        position: fixed; inset: 0; z-index: 50;
        display: flex; align-items: center; justify-content: center;
        padding: 16px;
      }
      #assessModal.hidden { display: none !important; }

      /* overlay */
      #modalOverlay {
        position: absolute; inset: 0;
        background: rgba(2,11,24,0.80);
        backdrop-filter: blur(8px);
      }

      /* modal card */
      .modal-card {
        position: relative;
        background: rgba(6,21,39,0.96);
        border: 1px solid rgba(59,130,246,0.25);
        border-radius: 22px;
        backdrop-filter: blur(24px);
        padding: 24px;
        width: 100%; max-width: 560px;
        max-height: 90vh; overflow-y: auto;
        display: flex; flex-direction: column; gap: 18px;
        box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      }
      /* top accent */
      .modal-card::before {
        content: ''; position: absolute;
        top: 0; left: 0; right: 0; height: 2px;
        border-radius: 22px 22px 0 0;
        background: linear-gradient(90deg, var(--blue-500), var(--accent-sky));
      }
      @media(min-width:1024px) { .modal-card { max-width: 720px; } }

      /* close btn */
      #modalClose {
        position: absolute; top: 14px; right: 14px;
        width: 34px; height: 34px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: var(--white-ghost); background: rgba(59,130,246,0.08);
        border: 1px solid rgba(59,130,246,0.15);
        cursor: pointer; transition: all .3s; outline: none;
      }
      #modalClose:hover { color: var(--white-pure); background: rgba(59,130,246,0.18); border-color: var(--blue-400); }
      #modalClose .material-symbols-outlined { font-size: 18px; }

      /* player info */
      .modal-player {
        display: flex; align-items: center; gap: 14px;
        padding-right: 44px;
      }
      #modalAvatar {
        width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
        border: 2px solid rgba(59,130,246,0.4);
        object-fit: cover;
      }
      #modalTitle {
        font-family: 'Oswald', sans-serif;
        font-size: 1.1rem; letter-spacing: .06em;
        color: var(--white-pure); margin-bottom: 2px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      #modalSport {
        font-size: .8rem; font-weight: 600;
        color: var(--white-ghost); letter-spacing: .06em;
      }

      /* detail rows */
      .detail-label {
        font-size: .68rem; font-weight: 700;
        letter-spacing: .16em; text-transform: uppercase;
        color: var(--white-ghost); margin-bottom: 3px;
      }
      .detail-value {
        font-family: 'Oswald', sans-serif;
        font-size: 1rem; letter-spacing: .04em;
        color: var(--white-pure);
      }
      .detail-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      }

      /* metrics */
      #modalMetrics { display: flex; flex-direction: column; gap: 8px; }

      /* video */
      #modalVideoContainer { display: flex; flex-direction: column; gap: 8px; }
      #modalVideo {
        width: 100%; border-radius: 12px;
        background: #000;
        border: 1px solid rgba(59,130,246,0.18);
      }

      /* divider */
      .modal-divider {
        border: none;
        border-top: 1px solid rgba(59,130,246,0.12);
        margin: 0;
      }

      /* reject textarea */
      #rejectReasonContainer { display: flex; flex-direction: column; gap: 8px; }
      .reject-label {
        font-size: .78rem; font-weight: 700;
        letter-spacing: .1em; text-transform: uppercase;
        color: var(--white-ghost);
      }
      .reject-label span { color: #f87171; }
      #rejectReason {
        width: 100%; padding: 11px 13px;
        background: rgba(59,130,246,0.07);
        border: 1px solid rgba(59,130,246,0.22);
        border-radius: 10px;
        color: var(--white-pure);
        font-family: 'Rajdhani', sans-serif;
        font-size: .92rem; font-weight: 500;
        resize: none; outline: none;
        transition: border-color .3s, box-shadow .3s;
      }
      #rejectReason:focus {
        border-color: var(--blue-400);
        box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
      }
      #rejectReason::placeholder { color: var(--white-ghost); }
      #rejectReasonError {
        font-size: .78rem; font-weight: 600;
        color: #f87171; letter-spacing: .04em;
      }

      /* action buttons */
      .action-row {
        display: flex; flex-direction: column; gap: 10px;
      }
      @media(min-width:480px) { .action-row { flex-direction: row; } }

      #approveBtn {
        flex: 1; padding: 12px 16px; border-radius: 12px;
        background: rgba(5,150,105,0.18);
        border: 1px solid rgba(5,150,105,0.35);
        color: #34D399; cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 7px;
        font-family: 'Rajdhani', sans-serif;
        font-size: .92rem; font-weight: 700; letter-spacing: .1em;
        text-transform: uppercase; min-height: 44px;
        transition: all .25s;
      }
      #approveBtn:hover { background: rgba(5,150,105,0.30); border-color: #34D399; color: #fff; }
      #approveBtn .material-symbols-outlined { font-size: 18px; }

      #rejectBtn {
        flex: 1; padding: 12px 16px; border-radius: 12px;
        background: rgba(239,68,68,0.12);
        border: 1px solid rgba(239,68,68,0.3);
        color: #f87171; cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 7px;
        font-family: 'Rajdhani', sans-serif;
        font-size: .92rem; font-weight: 700; letter-spacing: .1em;
        text-transform: uppercase; min-height: 44px;
        transition: all .25s;
      }
      #rejectBtn:hover { background: rgba(239,68,68,0.24); border-color: #f87171; color: #fff; }
      #rejectBtn .material-symbols-outlined { font-size: 18px; }

      #cancelRejectBtn {
        flex: 1; padding: 12px 16px; border-radius: 12px;
        background: rgba(59,130,246,0.08);
        border: 1px solid rgba(59,130,246,0.22);
        color: var(--white-ghost); cursor: pointer;
        font-family: 'Rajdhani', sans-serif;
        font-size: .92rem; font-weight: 700; letter-spacing: .1em;
        text-transform: uppercase; min-height: 44px;
        transition: all .25s;
      }
      #cancelRejectBtn:hover { background: rgba(59,130,246,0.16); color: var(--white-pure); }

      #submitRejectBtn {
        flex: 1; padding: 12px 16px; border-radius: 12px;
        background: rgba(239,68,68,0.12);
        border: 1px solid rgba(239,68,68,0.3);
        color: #f87171; cursor: pointer;
        font-family: 'Rajdhani', sans-serif;
        font-size: .92rem; font-weight: 700; letter-spacing: .1em;
        text-transform: uppercase; min-height: 44px;
        transition: all .25s;
      }
      #submitRejectBtn:hover { background: rgba(239,68,68,0.26); border-color: #f87171; color: #fff; }

      #submitRejectContainer { display: flex; gap: 10px; flex-wrap: wrap; }
      @media(min-width:480px) { #submitRejectContainer { flex-wrap: nowrap; } }

      /* modal error */
      #modalError {
        font-size: .82rem; font-weight: 600;
        color: #f87171; letter-spacing: .04em;
        word-break: break-word;
      }

      /* ── HIDDEN ── */
      .hidden { display: none !important; }
    </style>
  </head>

  <body data-page="coach-assessments">
    <div class="particles" id="particles"></div>

    <div class="page-wrap">
      <main>

        <!-- HEADER -->
        <header>
          <button id="backBtn" class="header-btn" aria-label="Back to previous page" title="Back">
            <span class="material-symbols-outlined">arrow_back_ios_new</span>
          </button>
          <h1>Assessments</h1>
          <a href="notifications.html" class="header-btn notif-wrap" aria-label="Notifications" data-notify-bell>
            <span class="material-symbols-outlined">notifications</span>
            <span class="notif-dot"></span>
          </a>
        </header>

        <!-- PENDING SECTION -->
        <div style="display:flex;flex-direction:column;gap:14px">
          <h2 id="pendingHeader" aria-live="polite">
            Pending (<span id="pendingCount">0</span>)
          </h2>

          <!-- LOADING STATE -->
          <div id="loadingState" style="display:flex;flex-direction:column;gap:12px">
            <div class="skeleton-card">
              <div class="skel-avatar"></div>
              <div class="skel-lines">
                <div class="skel-line" style="width:35%"></div>
                <div class="skel-line" style="width:55%"></div>
                <div class="skel-line" style="width:25%"></div>
              </div>
            </div>
          </div>

          <!-- EMPTY STATE -->
          <div id="emptyState" class="hidden">
            <p>No pending assessments.</p>
          </div>

          <!-- CARDS CONTAINER (injected by coach.js) -->
          <div id="cardsContainer" class="hidden" style="display:flex;flex-direction:column;gap:12px"></div>
        </div>

      </main>
    </div>

    <!-- ── MODAL ── -->
    <div id="assessModal" class="hidden" aria-modal="true" role="dialog" aria-labelledby="modalTitle">
      <div id="modalOverlay"></div>
      <div class="modal-card">

        <!-- CLOSE -->
        <button id="modalClose" aria-label="Close modal" title="Close">
          <span class="material-symbols-outlined">close</span>
        </button>

        <!-- PLAYER INFO -->
        <div class="modal-player">
          <img id="modalAvatar" alt="Player avatar" src="" />
          <div style="min-width:0;flex:1">
            <div id="modalTitle"></div>
            <div id="modalSport"></div>
          </div>
        </div>

        <!-- ASSESSMENT DETAILS -->
        <div style="display:flex;flex-direction:column;gap:14px">
          <div>
            <div class="detail-label">Drill</div>
            <div id="modalDrill" class="detail-value"></div>
          </div>
          <div class="detail-grid">
            <div>
              <div class="detail-label">Score</div>
              <div id="modalScore" class="detail-value" style="word-break:break-word"></div>
            </div>
            <div>
              <div class="detail-label">Submitted</div>
              <div id="modalDate" style="font-size:.85rem;color:var(--white-ghost)"></div>
            </div>
          </div>
          <div id="modalMetrics"></div>
          <div id="modalVideoContainer" class="hidden">
            <div class="detail-label">Proof Video</div>
            <video id="modalVideo" controls preload="metadata">
              <source src="" type="video/mp4" />
              <source src="" type="video/webm" />
              Your browser does not support the video tag.
            </video>
          </div>
        </div>

        <hr class="modal-divider" />

        <!-- ACTIONS -->
        <div style="display:flex;flex-direction:column;gap:12px">

          <!-- REJECT REASON -->
          <div id="rejectReasonContainer" class="hidden">
            <label for="rejectReason" class="reject-label">
              Rejection Reason <span>*</span>
            </label>
            <textarea id="rejectReason" rows="3" placeholder="Explain why this assessment is being rejected..."></textarea>
            <p id="rejectReasonError" class="hidden" aria-live="assertive">Rejection reason is required.</p>
          </div>

          <!-- ACTION BUTTONS -->
          <div id="actionButtons" class="action-row">
            <button id="approveBtn">
              <span class="material-symbols-outlined">check_circle</span>
              Approve
            </button>
            <button id="rejectBtn">
              <span class="material-symbols-outlined">cancel</span>
              Reject
            </button>
          </div>

          <!-- SUBMIT REJECT -->
          <div id="submitRejectContainer" class="hidden">
            <button id="cancelRejectBtn">Cancel</button>
            <button id="submitRejectBtn">Submit Rejection</button>
          </div>
        </div>

        <!-- MODAL ERROR -->
        <p id="modalError" class="hidden" aria-live="assertive"></p>

      </div>
    </div>

    <!-- SCRIPTS — all untouched -->
    <script type="module" src="js/notify-dot.js"></script>
    <script type="module" src="js/assessments/coach.js"></script>
    <script type="module" src="js/nav.js"></script>

    <script>
      // Smart back button
      document.getElementById('backBtn')?.addEventListener('click', function() {
        if (window.history.length > 1 && document.referrer) {
          window.history.back();
        } else {
          window.location.href = 'coachVerifyLand.html';
        }
      });

      // Hide bottom nav when modal open
      const modal = document.getElementById('assessModal');
      const modalClose = document.getElementById('modalClose');

      if (modal && modalClose) {
        const openModal = () => { document.body.classList.add('modal-open'); void document.body.offsetHeight; };
        const closeModal = () => { document.body.classList.remove('modal-open'); void document.body.offsetHeight; };

        modalClose.addEventListener('click', closeModal);
        document.getElementById('modalOverlay')?.addEventListener('click', closeModal);

        new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            if (mutation.target === modal && mutation.type === 'attributes' && mutation.attributeName === 'class') {
              modal.classList.contains('hidden') ? closeModal() : openModal();
            }
          });
        }).observe(modal, { attributes: true });
      }

      // Particles
      const pc = document.getElementById('particles');
      const cols = ['#3B82F6','#6EA8FE','#38BDF8','#ffffff'];
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'p';
        const s = Math.random() * 3 + 1.5;
        p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${9+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
        pc.appendChild(p);
      }
    </script>
  </body>
</html>
