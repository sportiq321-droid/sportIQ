<!-- player-schedules.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Player Schedules - SportIQ</title>

    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/schedules.css" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --blue-950: #020B18;
        --blue-900: #061527;
        --blue-600: #1146A0;
        --blue-500: #1A5FD4;
        --blue-400: #3B82F6;
        --blue-300: #6EA8FE;
        --white-pure: #FFFFFF;
        --white-ghost: #A8BBDA;
        --accent-sky: #38BDF8;
        --card-bg: rgba(6,21,39,0.78);
        --border: rgba(59,130,246,0.20);
      }

      html, body {
        min-height: 100vh;
        background: var(--blue-950);
        color: var(--white-pure);
        font-family: 'Rajdhani', sans-serif;
        overflow-x: hidden;
      }

      /* ── BG ── */
      body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0;
        background:
          radial-gradient(ellipse at 20% 20%, rgba(26,95,212,0.18) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 80%, rgba(56,189,248,0.07) 0%, transparent 50%),
          linear-gradient(135deg, #020B18 0%, #040F20 100%);
        pointer-events: none;
      }
      body::after {
        content: '';
        position: fixed; inset: 0; z-index: 0;
        background-image:
          linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }

      /* ── PARTICLES ── */
      .particles { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
      .p { position:absolute; border-radius:50%; animation:floatUp linear infinite; opacity:0; }
      @keyframes floatUp {
        0%   { transform:translateY(100vh) scale(0); opacity:0; }
        10%  { opacity:0.4; }
        90%  { opacity:0.15; }
        100% { transform:translateY(-10vh) scale(1.2); opacity:0; }
      }

      /* ── PAGE WRAP ── */
      .page-wrap {
        position: relative; z-index: 1;
        display: flex; flex-direction: column;
        min-height: 100vh;
      }

      /* ── HEADER ── */
      header {
        position: sticky; top: 0; z-index: 20;
        background: rgba(2,11,24,0.92);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(59,130,246,0.14);
        animation: fadeDown .5s ease both;
      }
      @keyframes fadeDown {
        from { opacity:0; transform:translateY(-14px); }
        to   { opacity:1; transform:translateY(0); }
      }
      .header-inner {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 18px;
      }
      .header-btn {
        width: 40px; height: 40px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: var(--white-ghost);
        background: rgba(59,130,246,0.08);
        border: 1px solid rgba(59,130,246,0.15);
        cursor: pointer; transition: all .3s;
        text-decoration: none; outline: none; flex-shrink: 0;
      }
      .header-btn:hover { color: var(--white-pure); background: rgba(59,130,246,0.16); border-color: var(--blue-400); }
      .header-btn .material-symbols-outlined { font-size: 20px; }
      #pageTitle {
        font-family: 'Oswald', sans-serif;
        font-size: 1.15rem; letter-spacing: .16em;
        color: var(--white-pure); flex: 1; text-align: center;
      }
      .notif-wrap { position: relative; }
      .notif-dot-el {
        position: absolute; top: 1px; right: 1px;
        width: 8px; height: 8px; background: #ef4444;
        border-radius: 50%; border: 1.5px solid var(--blue-950);
      }

      /* ── STICKY STRIPS ── */
      .sticky-strip {
        position: sticky; z-index: 10;
        padding: 8px 16px 0;
      }
      .strip-inner {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 12px; padding: 8px 12px;
        display: flex; align-items: center; gap: 8px;
        overflow-x: auto; backdrop-filter: blur(16px);
        scrollbar-width: none;
      }
      .strip-inner::-webkit-scrollbar { display: none; }

      /* ── CHIP BASE ── */
      .chip {
        flex-shrink: 0;
        padding: 5px 13px; border-radius: 16px;
        font-family: 'Rajdhani', sans-serif;
        font-size: .74rem; font-weight: 700; letter-spacing: .08em;
        text-transform: uppercase; cursor: pointer;
        background: rgba(59,130,246,0.07);
        border: 1px solid rgba(59,130,246,0.16);
        color: var(--white-ghost); transition: all .2s;
        text-decoration: none; white-space: nowrap;
      }
      .chip:hover { background: rgba(59,130,246,0.14); color: var(--white-pure); border-color: rgba(59,130,246,0.38); }

      /* active chip — view tabs + range */
      .chip-active {
        background: linear-gradient(135deg, var(--blue-500), var(--blue-600)) !important;
        border-color: transparent !important;
        color: #fff !important;
        box-shadow: 0 0 12px rgba(26,95,212,0.4);
      }

      /* dow chips */
      .dow-chip[data-selected="true"] {
        background: rgba(59,130,246,0.22) !important;
        border-color: var(--blue-400) !important;
        color: var(--white-pure) !important;
      }

      /* strip labels */
      .strip-label {
        font-size: .68rem; font-weight: 700; letter-spacing: .12em;
        text-transform: uppercase; color: var(--white-ghost);
        flex-shrink: 0; white-space: nowrap;
      }

      /* entrance select */
      #entranceSel {
        padding: 4px 10px; border-radius: 8px; font-size: .72rem;
        background: rgba(59,130,246,0.08);
        border: 1px solid rgba(59,130,246,0.18);
        color: var(--white-pure);
        font-family: 'Rajdhani', sans-serif; font-weight: 600;
        outline: none; cursor: pointer; flex-shrink: 0;
        appearance: none; -webkit-appearance: none;
        transition: border-color .3s;
      }
      #entranceSel:focus { border-color: var(--blue-400); }
      #entranceSel option { background: #061527; color: #fff; }

      /* location pending note */
      .filter-note {
        margin-left: auto; font-size: .65rem; color: rgba(168,187,218,0.4);
        flex-shrink: 0; white-space: nowrap;
      }

      /* ── MAIN ── */
      main {
        flex: 1; overflow-y: auto;
        padding: 16px 16px 110px;
        animation: fadeUp .5s ease .1s both;
      }
      @keyframes fadeUp {
        from { opacity:0; transform:translateY(18px); }
        to   { opacity:1; transform:translateY(0); }
      }
      #listContainer { max-width: 860px; margin: 0 auto; }

      /* ── SKELETON ── */
      #skeletons { display: flex; flex-direction: column; gap: 10px; }
      .skel-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 14px; height: 96px;
        animation: pulse 1.6s ease-in-out infinite;
        backdrop-filter: blur(14px);
      }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

      /* ── RENDERED CARD (glassmorphic alias) ── */
      .siq-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 14px; padding: 16px;
        backdrop-filter: blur(16px);
        margin-bottom: 10px;
        position: relative; overflow: hidden;
        transition: border-color .25s;
      }
      .siq-card::before {
        content: ''; position: absolute;
        top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, var(--blue-500), var(--accent-sky));
        opacity: 0; transition: opacity .25s;
      }
      .siq-card:hover { border-color: rgba(59,130,246,0.38); }
      .siq-card:hover::before { opacity: 1; }

      /* empty / error states */
      .state-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 14px; padding: 24px;
        text-align: center; backdrop-filter: blur(14px);
      }

      /* segment strip (injected by JS) */
      .seg-strip {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 12px; padding: 8px 12px;
        display: flex; align-items: center; gap: 8px;
        overflow-x: auto; backdrop-filter: blur(14px);
        margin-bottom: 12px; scrollbar-width: none;
      }
      .seg-strip::-webkit-scrollbar { display: none; }
    </style>
  </head>

  <body>
    <div class="particles" id="particles"></div>

    <div class="page-wrap">

      <!-- HEADER -->
      <header>
        <div class="header-inner">
          <button id="backBtn" class="header-btn" aria-label="Back to Schedules" title="Back to Schedules">
            <span class="material-symbols-outlined">arrow_back</span>
          </button>
          <h1 id="pageTitle">Player Schedules</h1>
          <a href="notifications.html" class="header-btn notif-wrap" aria-label="Notifications" data-notify-bell>
            <span class="material-symbols-outlined">notifications</span>
            <span class="notif-dot-el"></span>
          </a>
        </div>
      </header>

      <!-- VIEW TABS -->
      <div class="sticky-strip" style="top:57px">
        <div class="strip-inner" role="toolbar" aria-label="Views">
          <a href="player-schedules.html?view=available" class="chip" data-chip="available">Available</a>
          <a href="player-schedules.html?view=my"        class="chip" data-chip="my">My Schedules</a>
        </div>
      </div>

      <!-- FILTERS -->
      <div class="sticky-strip" style="top:106px; padding-bottom:8px">
        <div id="filterBar" class="strip-inner">
          <span class="strip-label">Range</span>
          <button class="chip" data-range="7d">7D</button>
          <button class="chip" data-range="30d">30D</button>
          <button class="chip" data-range="90d">90D</button>

          <span class="strip-label" style="margin-left:8px">Entrance</span>
          <select id="entranceSel">
            <option value="ALL">All</option>
            <option value="OPEN">Open</option>
            <option value="APPROVAL">Approval</option>
          </select>

          <span class="strip-label" style="margin-left:8px">Days</span>
          <div id="dowWrap" class="flex items-center gap-1 shrink-0"></div>

          <span class="filter-note">(Location filter pending backend update)</span>
        </div>
      </div>

      <!-- MAIN -->
      <main role="main">
        <div id="listContainer">
          <div id="skeletons" class="hidden">
            <div class="skel-card"></div>
            <div class="skel-card"></div>
            <div class="skel-card"></div>
          </div>
        </div>
      </main>

    </div>

    <!-- SESSION GUARD — untouched -->
    <script type="module">
      (async () => {
        try {
          const r = await fetch("/api/me", { credentials: "same-origin" });
          if (!r.ok) {
            const returnTo = encodeURIComponent(location.pathname + location.search);
            location.href = `login.html?returnTo=${returnTo}`;
          }
        } catch {
          const returnTo = encodeURIComponent(location.pathname + location.search);
          location.href = `login.html?returnTo=${returnTo}`;
        }
      })();
    </script>

    <!-- PAGE CONTROLLER — all logic untouched, only HTML template strings updated -->
    <script type="module">
      import API from "./js/api.js";

      const state = {
        view: "available",
        range: "30d",
        entrance: "ALL",
        dows: new Set([0, 1, 2, 3, 4, 5, 6]),
        myStatus: "ALL",
      };

      const qs = new URLSearchParams(location.search);
      state.view = (qs.get("view") || "available").toLowerCase();

      const pageTitle    = document.getElementById("pageTitle");
      const listContainer = document.getElementById("listContainer");
      const skeletons    = document.getElementById("skeletons");
      const entranceSel  = document.getElementById("entranceSel");
      const dowWrap      = document.getElementById("dowWrap");

      const startOfDay = (d) => { const x = new Date(d); x.setHours(0,0,0,0); return x; };
      const endOfDay   = (d) => { const x = new Date(d); x.setHours(23,59,59,999); return x; };
      const daysFromNow = (n) => { const x = new Date(); x.setDate(x.getDate()+n); return x; };
      const getRangeDays = () => state.range === "7d" ? 7 : state.range === "90d" ? 90 : 30;
      const getWindow = () => {
        const n = getRangeDays();
        return { start: startOfDay(new Date()), end: endOfDay(daysFromNow(n-1)) };
      };
      const inRange  = (dateStr, start, end) => { const d = new Date(dateStr); return d >= start && d <= end; };
      const dayIndex = (dateStr) => new Date(dateStr).getDay();
      const fmtDate  = (d) => { try { return new Date(d).toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"}); } catch { return "-"; } };
      const fmtTimeRange = (s, e) => {
        const opt = { hour:"2-digit", minute:"2-digit" };
        const st = s ? new Date(`1970-01-01T${s}:00`).toLocaleTimeString(undefined,opt) : "";
        const et = e ? new Date(`1970-01-01T${e}:00`).toLocaleTimeString(undefined,opt) : "";
        return e ? `${st} – ${et}` : st;
      };
      const escapeHtml = (str="") => String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");

      const showSkeleton = (show) => skeletons.classList.toggle("hidden", !show);
      const setTitle = () => (pageTitle.textContent = state.view === "available" ? "Available Schedules" : "My Schedules");
      const highlightViewChip = () => {
        document.querySelectorAll("[data-chip]").forEach(ch => {
          ch.classList.remove("chip-active");
          if (ch.getAttribute("data-chip") === state.view) ch.classList.add("chip-active");
        });
      };
      const highlightRangeChip = () => {
        document.querySelectorAll("[data-range]").forEach(btn => {
          btn.classList.remove("chip-active");
          if (btn.getAttribute("data-range") === state.range) btn.classList.add("chip-active");
        });
      };

      function buildFilterUI() {
        const labels = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
        dowWrap.innerHTML = "";
        labels.forEach((lbl, idx) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "dow-chip chip";
          btn.textContent = lbl;
          btn.dataset.idx = String(idx);
          const isSelected = state.dows.has(idx);
          btn.dataset.selected = String(isSelected);
          btn.addEventListener("click", () => {
            if (state.dows.has(idx)) state.dows.delete(idx);
            else state.dows.add(idx);
            render();
          });
          dowWrap.appendChild(btn);
        });
      }

      document.querySelectorAll("[data-range]").forEach(btn => {
        btn.addEventListener("click", () => { state.range = btn.getAttribute("data-range") || "30d"; render(); });
      });
      entranceSel.addEventListener("change", () => { state.entrance = entranceSel.value || "ALL"; render(); });
      document.getElementById("backBtn").addEventListener("click", () => (location.href = "playerschedulesLand.html"));

      async function render() {
        setTitle(); highlightViewChip(); highlightRangeChip(); buildFilterUI(); showSkeleton(true);
        const { start, end } = getWindow();
        try {
          if (state.view === "available") {
            const res = await API.getAvailableSchedules();
            let items = (res?.items || [])
              .filter(s => inRange(s.date, start, end))
              .filter(s => state.entrance === "ALL" ? true : s.entrance === state.entrance)
              .filter(s => state.dows.has(dayIndex(s.date)));
            listContainer.innerHTML = items.length
              ? items.map(scheduleCardAvailable).join("")
              : emptyState("No schedules match filters.");
            bindActionEvents();
          } else {
            const res = await API.getMyScheduleRequests();
            let items = (res?.items || [])
              .filter(r => r?.schedule?.date && inRange(r.schedule.date, start, end))
              .filter(r => state.entrance === "ALL" ? true : r.schedule.entrance === state.entrance)
              .filter(r => state.dows.has(dayIndex(r.schedule.date)));
            const filteredByStatus = state.myStatus === "ALL"
              ? items
              : items.filter(r => (r.status||"").toUpperCase() === state.myStatus);
            listContainer.innerHTML = segmentHeader(state.myStatus) +
              (filteredByStatus.length ? filteredByStatus.map(scheduleCardMy).join("") : emptyState("No schedules in selection."));
            bindActionEvents(); bindSegmentEvents();
          }
        } catch(e) {
          listContainer.innerHTML = errorState("Failed to load schedules.");
          console.error(e);
        } finally { showSkeleton(false); }
      }

      /* ── TEMPLATES — updated to SportIQ blue theme ── */
      const emptyState = (text) =>
        `<div class="state-card" style="color:var(--white-ghost)">${escapeHtml(text || "No data.")}</div>`;
      const errorState = (text) =>
        `<div class="state-card" style="color:#fca5a5">${escapeHtml(text || "Error.")}</div>`;

      function scheduleCardAvailable(s) {
        const status = s.myRequest?.status || null;
        const btn = (() => {
          if (status === "PENDING")
            return `<button style="padding:7px 14px;border-radius:8px;background:rgba(217,119,6,0.18);border:1px solid rgba(217,119,6,0.35);color:#FCD34D;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:not-allowed" disabled>Requested</button>
                    <button style="padding:7px 14px;border-radius:8px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.30);color:#f87171;font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s" data-act="leave" data-id="${escapeHtml(s.id)}">Cancel</button>`;
          if (status === "APPROVED")
            return `<span style="padding:5px 12px;border-radius:8px;background:rgba(5,150,105,0.14);border:1px solid rgba(5,150,105,0.28);color:#34D399;font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase">Approved</span>
                    <button style="padding:7px 14px;border-radius:8px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.30);color:#f87171;font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s" data-act="leave" data-id="${escapeHtml(s.id)}">Leave</button>`;
          if (s.entrance === "OPEN")
            return `<button style="padding:7px 14px;border-radius:8px;background:linear-gradient(135deg,#059669,#047857);border:none;color:#fff;font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;box-shadow:0 0 12px rgba(5,150,105,0.35);transition:all .2s" data-act="join" data-id="${escapeHtml(s.id)}">Join</button>`;
          return `<button style="padding:7px 14px;border-radius:8px;background:linear-gradient(135deg,var(--blue-500),var(--blue-600));border:none;color:#fff;font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;box-shadow:0 0 12px rgba(26,95,212,0.4);transition:all .2s" data-act="join" data-id="${escapeHtml(s.id)}">Request</button>`;
        })();
        const badge = s.entrance === "OPEN"
          ? `<span style="display:inline-block;font-size:.68rem;border-radius:12px;background:rgba(5,150,105,0.14);color:#34D399;border:1px solid rgba(5,150,105,0.28);padding:3px 10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">OPEN</span>`
          : `<span style="display:inline-block;font-size:.68rem;border-radius:12px;background:rgba(217,119,6,0.12);color:#FCD34D;border:1px solid rgba(217,119,6,0.28);padding:3px 10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">APPROVAL</span>`;
        return `
          <article class="siq-card">
            <header style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px">
              <div>
                <h3 style="font-family:'Oswald',sans-serif;font-size:1rem;letter-spacing:.06em;color:var(--white-pure);margin-bottom:3px">${fmtDate(s.date)}</h3>
                <p style="font-size:.78rem;color:var(--white-ghost)">${fmtTimeRange(s.startTime,s.endTime)} • ${escapeHtml(s.venue)}</p>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
                ${badge}
                <span style="font-size:.65rem;color:rgba(168,187,218,0.5)">${s.approvedCount} joined</span>
              </div>
            </header>
            <div style="display:flex;align-items:center;justify-content:space-between">
              <div style="font-size:.78rem;color:var(--white-ghost)">Coach: ${escapeHtml(s.coach?.name||s.coach?.username||"-")}</div>
              <div style="display:flex;gap:8px">${btn}</div>
            </div>
          </article>`;
      }

      function scheduleCardMy(r) {
        const s = r.schedule || {};
        const badge = (r.status||"").toUpperCase() === "APPROVED"
          ? `<span style="display:inline-block;font-size:.68rem;border-radius:12px;background:rgba(5,150,105,0.14);color:#34D399;border:1px solid rgba(5,150,105,0.28);padding:3px 10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">APPROVED</span>`
          : `<span style="display:inline-block;font-size:.68rem;border-radius:12px;background:rgba(217,119,6,0.12);color:#FCD34D;border:1px solid rgba(217,119,6,0.28);padding:3px 10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">PENDING</span>`;
        const btn = (r.status||"").toUpperCase() === "APPROVED"
          ? `<button style="padding:7px 14px;border-radius:8px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.30);color:#f87171;font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s" data-act="leave" data-id="${escapeHtml(s.id)}">Leave</button>`
          : `<button style="padding:7px 14px;border-radius:8px;background:rgba(217,119,6,0.12);border:1px solid rgba(217,119,6,0.28);color:#FCD34D;font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s" data-act="leave" data-id="${escapeHtml(s.id)}">Cancel</button>`;
        return `
          <article class="siq-card">
            <header style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px">
              <div>
                <h3 style="font-family:'Oswald',sans-serif;font-size:1rem;letter-spacing:.06em;color:var(--white-pure);margin-bottom:3px">${fmtDate(s.date)}</h3>
                <p style="font-size:.78rem;color:var(--white-ghost)">${fmtTimeRange(s.startTime,s.endTime)} • ${escapeHtml(s.venue)}</p>
              </div>
              <div style="display:flex;gap:8px;align-items:center">${badge}</div>
            </header>
            <div style="display:flex;align-items:center;justify-content:space-between">
              <div style="font-size:.78rem;color:var(--white-ghost)">Coach: ${escapeHtml(s.coach?.name||s.coach?.username||"-")}</div>
              <div style="display:flex;gap:8px">${btn}</div>
            </div>
          </article>`;
      }

      function segmentHeader(active) {
        const chip = (val, label) =>
          `<button class="chip${active===val?" chip-active":""}" data-seg="${val}">${label}</button>`;
        return `<div class="seg-strip">
          <span class="strip-label">Status</span>
          ${chip("ALL","All")}
          ${chip("PENDING","Pending")}
          ${chip("APPROVED","Approved")}
        </div>`;
      }

      function bindActionEvents() {
        listContainer.querySelectorAll("button[data-act]").forEach(btn => {
          btn.addEventListener("click", async () => {
            const act = btn.getAttribute("data-act");
            const id  = btn.getAttribute("data-id");
            if (!id) return;
            btn.disabled = true;
            try {
              if (act === "join")       await API.joinSchedule(id);
              else if (act === "leave") await API.leaveSchedule(id);
              await render();
            } catch(e) {
              console.error(e);
              alert(e.message || "Action failed. Please try again.");
              btn.disabled = false;
            }
          });
        });
      }

      function bindSegmentEvents() {
        listContainer.querySelectorAll("[data-seg]").forEach(b => {
          b.addEventListener("click", () => { state.myStatus = b.getAttribute("data-seg") || "ALL"; render(); });
        });
      }

      (async () => { highlightRangeChip(); await render(); })();
    </script>

    <!-- BOTTOM NAV + DOT — untouched -->
    <script type="module" src="js/notify-dot.js"></script>
    <script type="module" src="js/nav.js"></script>

    <script>
      const pc = document.getElementById('particles');
      const cols = ['#3B82F6','#6EA8FE','#38BDF8','#ffffff'];
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'p';
        const s = Math.random() * 3 + 1.5;
        p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${9+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
        pc.appendChild(p);
      }
    </script>
  </body>
</html>
