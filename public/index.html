<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportIQ - Sports Ecosystem</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Cinzel:wght@700;900&family=Rajdhani:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #00ff7f;
            --green-glow: #00c853;
            --gold: #ffd700;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            background: #0a1a0f;
        }

        /* ── DARK GRADIENT BG ── */
        .bg {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0, 80, 30, 0.5) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 30%, rgba(255, 140, 0, 0.15) 0%, transparent 50%),
                linear-gradient(135deg, #050e07 0%, #0a1a0f 50%, #071008 100%);
        }

        /* ── OLYMPIC IMAGE — TRANSPARENT OVERLAY ── */
        .olympic-img {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.13;
            mix-blend-mode: luminosity;
            animation: imgBreath 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes imgBreath {

            0%,
            100% {
                opacity: 0.10;
                transform: scale(1.00);
            }

            50% {
                opacity: 0.18;
                transform: scale(1.03);
            }
        }

        /* subtle vignette on top */
        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center,
                    transparent 30%,
                    rgba(0, 0, 0, 0.6) 100%);
            pointer-events: none;
        }

        /* golden light from bottom-right */
        .light-leak {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 85% 85%,
                    rgba(255, 160, 30, 0.20) 0%, transparent 55%);
            pointer-events: none;
        }

        /* ── PARTICLES ── */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .p {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        /* ── HERO ── */
        .hero {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(0, 10, 4, 0.60);
            border: 1px solid rgba(0, 255, 127, 0.20);
            border-radius: 24px;
            padding: 52px 64px;
            max-width: 680px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(22px) saturate(1.5);
            box-shadow:
                0 0 0 1px rgba(0, 255, 127, 0.07),
                0 0 80px rgba(0, 255, 127, 0.07),
                0 40px 80px rgba(0, 0, 0, 0.7);
            animation: cardReveal 1s cubic-bezier(.22, 1, .36, 1) both;
            position: relative;
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* corner accents */
        .card::before,
        .card::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: var(--green);
            border-style: solid;
            opacity: 0.7;
        }

        .card::before {
            top: 16px;
            left: 16px;
            border-width: 2px 0 0 2px;
            border-radius: 6px 0 0 0;
        }

        .card::after {
            bottom: 16px;
            right: 16px;
            border-width: 0 2px 2px 0;
            border-radius: 0 0 6px 0;
        }

        .welcome {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: .18em;
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            margin: 0 auto 8px;
            animation: typewriter 1.4s steps(12) 0.4s forwards;
        }

        @keyframes typewriter {
            to {
                width: 100%;
            }
        }

        .sports,
        .eco {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            color: var(--green);
            letter-spacing: .06em;
            line-height: 1;
            display: flex;
            justify-content: center;
            gap: .05em;
            filter: drop-shadow(0 0 24px rgba(0, 255, 127, 0.7));
            animation: glowPulse 3s ease-in-out 2s infinite;
        }

        .sports {
            font-size: clamp(3rem, 9vw, 5.2rem);
        }

        .eco {
            font-size: clamp(2.6rem, 8vw, 4.6rem);
            margin-bottom: 28px;
        }

        @keyframes glowPulse {

            0%,
            100% {
                filter: drop-shadow(0 0 18px rgba(0, 255, 127, 0.6));
            }

            50% {
                filter: drop-shadow(0 0 40px rgba(0, 255, 127, 1)) drop-shadow(0 0 80px rgba(0, 200, 80, 0.4));
            }
        }

        .sports span,
        .eco span {
            display: inline-block;
            opacity: 0;
            animation: dropIn .5s cubic-bezier(.34, 1.56, .64, 1) forwards;
        }

        @keyframes dropIn {
            from {
                opacity: 0;
                transform: translateY(-40px) rotate(-8deg);
            }

            to {
                opacity: 1;
                transform: translateY(0) rotate(0);
            }
        }

        .tagline {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 36px;
        }

        .tagline span {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(.9rem, 2.5vw, 1.2rem);
            font-weight: 700;
            color: var(--gold);
            letter-spacing: .22em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp .6s ease forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

    <div class="overlay"></div>
    <div class="light-leak"></div>
    <div class="particles" id="particles"></div>

    <section class="hero">
        <div class="card">
            <p class="welcome">WELCOME TO</p>
            <div class="sports" id="sports"></div>
            <div class="eco" id="eco"></div>
            <div class="tagline">
                <span style="animation-delay:2s">TRAIN.</span>
                <span style="animation-delay:2.2s">COMPETE.</span>
                <span style="animation-delay:2.4s">WIN.</span>
            </div>
            
            <div class="actions" style="margin-top: 30px; animation: fadeUp 0.6s ease forwards; animation-delay: 2.8s; opacity: 0; display: flex; justify-content: center; gap: 20px;">
                <a href="login.html" style="padding: 12px 32px; background: var(--green); color: #000; text-decoration: none; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.1em; transition: transform 0.2s, box-shadow 0.3s; box-shadow: 0 0 15px rgba(0,255,127,0.3);" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 0 25px rgba(0,255,127,0.5)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 0 15px rgba(0,255,127,0.3)';">Login</a>
                <a href="signup.html" style="padding: 12px 32px; background: transparent; border: 2px solid var(--green); color: var(--green); text-decoration: none; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s;" onmouseover="this.style.background='rgba(0,255,127,0.1)'; this.style.transform='translateY(-2px)';" onmouseout="this.style.background='transparent'; this.style.transform='translateY(0)';">Sign Up</a>
            </div>

        </div>
    </section>

    <script>
        function lettersAnimate(id, word, baseDelay) {
            const el = document.getElementById(id);
            [...word].forEach((ch, i) => {
                const s = document.createElement('span');
                s.textContent = ch;
                s.style.animationDelay = (baseDelay + i * 0.06) + 's';
                el.appendChild(s);
            });
        }
        lettersAnimate('sports', 'SPORTS', 1.6);
        lettersAnimate('eco', 'ECOSYSTEM', 1.9);

        const container = document.getElementById('particles');
        const colors = ['#00ff7f', '#ffd700', '#fff', '#00c853', '#ffec6e'];
        for (let i = 0; i < 55; i++) {
            const p = document.createElement('div');
            p.className = 'p';
            const size = Math.random() * 5 + 2;
            p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random() * 100}%;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      animation-duration:${6 + Math.random() * 10}s;
      animation-delay:${Math.random() * 8}s;
      box-shadow:0 0 ${size * 2}px currentColor;
    `;
            container.appendChild(p);
        }


    </script>
