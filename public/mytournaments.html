<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Tournaments - SportIQ</title>

    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/tournament.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --blue-950: #020B18;
        --blue-900: #061527;
        --blue-600: #1146A0;
        --blue-500: #1A5FD4;
        --blue-400: #3B82F6;
        --blue-300: #6EA8FE;
        --white-pure: #FFFFFF;
        --white-ghost: #A8BBDA;
        --accent-sky: #38BDF8;
        --card-bg: rgba(6,21,39,0.78);
        --border: rgba(59,130,246,0.20);
      }

      html, body {
        min-height: 100vh;
        background: var(--blue-950);
        color: var(--white-pure);
        font-family: 'Rajdhani', sans-serif;
        overflow-x: hidden;
      }

      /* ── BG ── */
      body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0;
        background:
          radial-gradient(ellipse at 20% 20%, rgba(26,95,212,0.18) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 80%, rgba(56,189,248,0.07) 0%, transparent 50%),
          linear-gradient(135deg, #020B18 0%, #040F20 100%);
        pointer-events: none;
      }
      body::after {
        content: '';
        position: fixed; inset: 0; z-index: 0;
        background-image:
          linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }

      /* ── PARTICLES ── */
      .particles { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
      .p { position:absolute; border-radius:50%; animation:floatUp linear infinite; opacity:0; }
      @keyframes floatUp {
        0%   { transform:translateY(100vh) scale(0); opacity:0; }
        10%  { opacity:0.4; }
        90%  { opacity:0.15; }
        100% { transform:translateY(-10vh) scale(1.2); opacity:0; }
      }

      /* ── PAGE WRAP ── */
      .page-wrap {
        position: relative; z-index: 1;
        display: flex; flex-direction: column;
        min-height: 100vh;
        max-width: 580px; margin: 0 auto;
      }

      /* ── HEADER ── */
      header {
        position: sticky; top: 0; z-index: 20;
        background: rgba(2,11,24,0.92);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(59,130,246,0.14);
        padding: 13px 16px 0;
        animation: fadeDown .5s ease both;
      }
      @keyframes fadeDown {
        from { opacity:0; transform:translateY(-14px); }
        to   { opacity:1; transform:translateY(0); }
      }

      .header-row {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 12px;
      }
      .header-title {
        font-family: 'Oswald', sans-serif;
        font-size: 1.1rem; letter-spacing: .16em;
        color: var(--white-pure);
      }

      /* avatar */
      .header-avatar {
        width: 38px; height: 38px; border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--blue-400);
        box-shadow: 0 0 10px rgba(59,130,246,0.3);
        transition: box-shadow .3s; display: block;
      }
      .header-avatar:hover { box-shadow: 0 0 20px rgba(59,130,246,0.55); }

      /* notif bell */
      .header-bell {
        width: 38px; height: 38px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: var(--white-ghost);
        background: rgba(59,130,246,0.07);
        border: 1px solid rgba(59,130,246,0.14);
        text-decoration: none; transition: all .3s; position: relative;
      }
      .header-bell:hover { color: var(--white-pure); background: rgba(59,130,246,0.15); border-color: var(--blue-400); }
      .header-bell .material-symbols-outlined { font-size: 20px; }
      .notif-dot {
        position: absolute; top: 1px; right: 1px;
        width: 8px; height: 8px; background: #ef4444;
        border-radius: 50%; border: 1.5px solid var(--blue-950);
      }

      /* ── LINE TOGGLE ── */
      .line-toggle {
        display: flex; position: relative;
        border-bottom: 1px solid rgba(59,130,246,0.12);
        margin: 0 -16px 12px;
        padding: 0 16px;
      }
      .line-toggle > div { flex: 1; }
      .line-toggle-option {
        display: flex; align-items: center; justify-content: center; gap: 6px;
        padding: 10px 0;
        font-family: 'Rajdhani', sans-serif;
        font-size: .82rem; font-weight: 700; letter-spacing: .12em;
        text-transform: uppercase; color: var(--white-ghost);
        cursor: pointer; transition: color .25s;
        text-decoration: none; white-space: nowrap;
      }
      .line-toggle-option.active { color: var(--white-pure); }
      .line-toggle-slider {
        position: absolute; bottom: 0; left: 50%;
        width: calc(50% - 16px); height: 2px;
        background: linear-gradient(90deg, var(--blue-500), var(--accent-sky));
        border-radius: 2px;
        transition: left .3s cubic-bezier(.4,0,.2,1);
        box-shadow: 0 0 8px rgba(59,130,246,0.5);
      }

      /* badge */
      .badge-soft {
        display: inline-flex; align-items: center; justify-content: center;
        min-width: 18px; height: 18px; padding: 0 5px;
        border-radius: 10px;
        background: rgba(59,130,246,0.15);
        border: 1px solid rgba(59,130,246,0.28);
        font-size: .65rem; font-weight: 700; letter-spacing: .04em;
        color: var(--blue-300);
      }

      /* ── FILTER CHIPS ── */
      .chips-row {
        display: flex; gap: 7px;
        overflow-x: auto; padding-bottom: 12px;
        scrollbar-width: none;
        margin: 0 -16px; padding-left: 16px; padding-right: 16px;
      }
      .chips-row::-webkit-scrollbar { display: none; }

      .flt-chip {
        flex-shrink: 0;
        padding: 6px 16px; border-radius: 20px;
        font-family: 'Rajdhani', sans-serif;
        font-size: .78rem; font-weight: 700; letter-spacing: .1em;
        text-transform: uppercase; cursor: pointer;
        background: rgba(59,130,246,0.07);
        border: 1px solid rgba(59,130,246,0.18);
        color: var(--white-ghost); transition: all .2s;
        white-space: nowrap;
      }
      .flt-chip:hover {
        background: rgba(59,130,246,0.14);
        border-color: rgba(59,130,246,0.38);
        color: var(--white-pure);
      }
      .flt-chip.active,
      .flt-chip[data-active="true"] {
        background: linear-gradient(135deg, var(--blue-500), var(--blue-600));
        border-color: transparent; color: #fff;
        box-shadow: 0 0 12px rgba(26,95,212,0.4);
      }

      /* ── MAIN ── */
      main {
        flex: 1; padding: 20px 16px 110px;
        animation: fadeUp .5s ease .1s both;
      }
      @keyframes fadeUp {
        from { opacity:0; transform:translateY(18px); }
        to   { opacity:1; transform:translateY(0); }
      }
      #myTournamentsList { display: flex; flex-direction: column; gap: 14px; }

      /* ── DETAILS OVERLAY ── */
      #mtOverlay {
        position: fixed; inset: 0; z-index: 60;
      }
      #mtOverlay.hidden { display: none !important; }

      #mtOverlayBg {
        position: absolute; inset: 0;
        background: rgba(0,0,0,0.65);
        backdrop-filter: blur(6px);
        opacity: 0; transition: opacity .2s ease;
      }

      #mtOverlayPanel {
        position: relative;
        margin: 0 auto; width: 100%; max-width: 580px;
        height: 100%; overflow-y: auto;
        padding-bottom: 104px;
        transform: translateY(12px);
        opacity: 0;
        transition: transform .2s ease, opacity .2s ease;
      }

      /* overlay header row */
      .overlay-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 16px 0;
      }
      .overlay-back {
        width: 38px; height: 38px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: var(--white-ghost);
        background: rgba(59,130,246,0.08);
        border: 1px solid rgba(59,130,246,0.15);
        cursor: pointer; transition: all .3s;
      }
      .overlay-back:hover { color: var(--white-pure); background: rgba(59,130,246,0.15); border-color: var(--blue-400); }
      .overlay-title {
        font-family: 'Oswald', sans-serif;
        font-size: 1.05rem; letter-spacing: .14em;
        color: var(--white-pure);
      }

      /* banner */
      .overlay-banner {
        position: relative; height: 176px; width: 100%;
        margin-top: 10px;
      }
      #mtBanner {
        position: absolute; inset: 0;
        background-size: cover; background-position: center;
        border-radius: 0 0 16px 16px;
      }
      .overlay-banner::after {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(to top, rgba(2,11,24,0.96) 0%, rgba(2,11,24,0.45) 55%, transparent 100%);
        border-radius: 0 0 16px 16px;
      }

      /* detail card */
      .overlay-detail {
        margin: -28px 16px 32px;
        position: relative; z-index: 1;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px; padding: 22px;
        backdrop-filter: blur(20px);
      }
      .overlay-detail::before {
        content: ''; position: absolute;
        top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, var(--blue-500), var(--accent-sky));
        border-radius: 16px 16px 0 0;
      }

      #mtName {
        font-family: 'Oswald', sans-serif;
        font-size: 1.45rem; letter-spacing: .07em;
        color: var(--white-pure); margin-bottom: 6px;
      }
      #mtDesc { font-size: .88rem; color: var(--white-ghost); line-height: 1.55; }

      .facts-list {
        margin-top: 18px;
        padding-left: 14px;
        border-left: 2px solid var(--blue-500);
        display: flex; flex-direction: column; gap: 12px;
      }
      .fact-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
      .fact-label {
        font-size: .75rem; font-weight: 700; letter-spacing: .1em;
        text-transform: uppercase; color: var(--white-ghost); white-space: nowrap;
      }
      .fact-val { font-size: .85rem; font-weight: 600; color: var(--white-pure); text-align: right; max-width: 65%; }
    </style>
  </head>

  <body data-page="mytournaments.html">
    <div class="particles" id="particles"></div>

    <div class="page-wrap">

      <!-- HEADER -->
      <header>
        <div class="header-row">
          <a href="profile.html" aria-label="Profile">
            <img id="headerAvatar" src="img/defaultavatar.jpg" alt="Profile avatar" class="header-avatar" />
          </a>
          <span class="header-title">Tournaments</span>
          <a href="notifications.html" class="header-bell" aria-label="Notifications" data-notify-bell>
            <span class="material-symbols-outlined">notifications</span>
            <span class="notif-dot"></span>
          </a>
        </div>
      </header>

      <!-- LIST -->
      <main>

        <!-- Toggle -->
        <div class="line-toggle">
          <div class="flex-1">
            <a href="find-tournament.html" class="line-toggle-option" style="justify-content:center">
              <span>Find Tournaments</span>
            </a>
          </div>
          <div class="flex-1">
            <span class="line-toggle-option active">
              My Tournaments
              <span id="myTournamentsCount" class="badge-soft" aria-label="Ongoing tournaments count">0</span>
            </span>
          </div>
          <div class="line-toggle-slider"></div>
        </div>

        <!-- Filter chips -->
        <div class="chips-row" style="margin-bottom: 16px;">
          <button class="flt-chip" data-filter="ALL">All</button>
          <button class="flt-chip" data-filter="PENDING">Pending</button>
          <button class="flt-chip" data-filter="CONFIRMED">Confirmed</button>
          <button class="flt-chip" data-filter="REJECTED">Rejected</button>
        </div>
        
        <div id="myTournamentsList"></div>
      </main>

    </div><!-- /.page-wrap -->

    <!-- ── DETAILS OVERLAY ── -->
    <div id="mtOverlay" class="hidden">
      <div id="mtOverlayBg"></div>
      <div id="mtOverlayPanel">

        <div class="overlay-header">
          <button id="mtClose" type="button" aria-label="Back" class="overlay-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true">
              <path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"/>
            </svg>
          </button>
          <span class="overlay-title">Tournament Details</span>
          <div style="width:38px"></div>
        </div>

        <!-- Banner -->
        <div class="overlay-banner">
          <div id="mtBanner"></div>
        </div>

        <!-- Detail card -->
        <div class="overlay-detail">
          <h3 id="mtName"></h3>
          <p id="mtDesc"></p>
          <div class="facts-list">
            <div class="fact-row">
              <span class="fact-label">Location</span>
              <span id="mtVenue" class="fact-val"></span>
            </div>
            <div class="fact-row">
              <span class="fact-label">Date</span>
              <span id="mtDate" class="fact-val"></span>
            </div>
            <div class="fact-row">
              <span class="fact-label">Sport</span>
              <span id="mtSport" class="fact-val"></span>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- ALL SCRIPTS — untouched -->
    <script type="module" src="js/mytournaments.js"></script>
    <script type="module" src="js/notify-dot.js"></script>

    <script type="module">
      import { requireLogin } from "./js/core/auth.js";
      requireLogin();
      import { getCurrentUser } from "./js/modules/users.js";
      const img = document.getElementById("headerAvatar");
      try {
        const u = getCurrentUser();
        img.src = u?.profilePic || "img/defaultavatar.jpg";
      } catch {
        img.src = "img/defaultavatar.jpg";
      }
    </script>

    <script type="module">
      import { getCurrentUser } from "./js/modules/users.js";
      import { loadData } from "./js/core/storage.js";
      const el = document.getElementById("myTournamentsCount");
      try {
        const user = getCurrentUser();
        const data = loadData();
        let cnt = 0;
        if (user && Array.isArray(user.registeredTournaments)) {
          const now = new Date();
          user.registeredTournaments.forEach((r) => {
            const status = String(r.regStatus || "CONFIRMED").toUpperCase();
            if (status === "REJECTED") return;
            const admin = (data.tournaments || []).find((t) => t.id === r.id);
            if (admin && admin.endDateTime) {
              if (now <= new Date(admin.endDateTime)) cnt++;
            } else { cnt++; }
          });
        }
        if (el) el.textContent = String(cnt);
      } catch {}
    </script>

    <script type="module" src="js/nav.js"></script>

    <script>
      const pc = document.getElementById('particles');
      const cols = ['#3B82F6','#6EA8FE','#38BDF8','#ffffff'];
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'p';
        const s = Math.random() * 3 + 1.5;
        p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${9+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
        pc.appendChild(p);
      }
    </script>
  </body>
</html>
